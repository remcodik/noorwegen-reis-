<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<meta name="theme-color" content="#2d6a4f"/>
<title>Noorwegen Reisplanner</title>
<style>
*{box-sizing:border-box}body{margin:0;background:#f4f9f5;color:#173b2a;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}main{max-width:950px;margin:auto;padding:16px 12px 48px}.hero{background:linear-gradient(135deg,#173a2a,#2d6a4f 65%,#52b788);color:white;border-radius:18px;padding:24px 20px;margin-bottom:12px}.hero h1{margin:3px 0 6px;font-size:26px}.sub{opacity:.9}.stats,.tabs,.filters,.links,.chips{display:flex;gap:7px;flex-wrap:wrap}.stats{margin-top:14px}.pill,.btn,button{border:1px solid #cfe3d4;background:white;color:#214b35;border-radius:999px;padding:7px 11px;font-weight:800;text-decoration:none;cursor:pointer}.pill{background:rgba(255,255,255,.16);color:white;border-color:rgba(255,255,255,.28);font-size:12px}.tabs{position:sticky;top:0;z-index:5;padding:8px 0;background:#f4f9f5ee;backdrop-filter:blur(10px)}.tabs button.active,.filters button.active{background:#2d6a4f;color:white}.card,.route,.form{background:white;border:1px solid #d7eadb;border-radius:15px;padding:14px;margin:12px 0;box-shadow:0 2px 12px rgba(39,91,61,.08)}.route{background:#e8f5e9}.head{display:flex;align-items:flex-start;gap:10px}.head h2{margin:0;font-size:20px;flex:1}.date{white-space:nowrap;background:#e8f5e9;color:#2d6a4f;border-radius:999px;padding:4px 9px;font-size:12px;font-weight:900}.note{line-height:1.55;color:#365b44}.facts{background:#f7fbf8;border:1px dashed #b8d7c1;border-radius:12px;padding:10px 12px;margin:10px 0}.section{font-size:12px;text-transform:uppercase;letter-spacing:1px;font-weight:950;color:#2d6a4f;margin:16px 0 8px}.activity{background:#f8fbf8;border:1px solid #d4e8d4;border-radius:13px;padding:12px;margin:9px 0}.activity.done{opacity:.58}.activityTop{display:flex;gap:8px;align-items:flex-start}.activityTop input{width:22px;height:22px}.activity h3{font-size:15px;margin:0 0 5px}.tag{font-size:12px;background:#e8f5e9;color:#2d6a4f;border-radius:999px;padding:3px 8px;font-weight:850}.desc{font-size:13px;line-height:1.55;color:#435b4c}.distance{display:grid;grid-template-columns:repeat(auto-fit,minmax(145px,1fr));gap:8px}.box{background:#f8fbf8;border:1px solid #d4e8d4;border-radius:12px;padding:10px}.box b{display:block}.notes,select,input,textarea{width:100%;border:1px solid #cfe3d4;border-radius:10px;padding:9px;font-family:inherit;font-size:15px}.notes{min-height:42px;margin-top:8px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:9px}.restaurant{background:#fff8f5;border:1px solid #e8c8a8;border-radius:12px;padding:12px}.restaurant b{color:#5a2a0a}.diary{background:#fffdf7;border:1px solid #eadfb8;border-radius:14px;padding:12px;margin:10px 0}.diary textarea{min-height:90px;background:#fffefb}.small{font-size:12px}.muted{color:#78937f}.footer{text-align:center;color:#78937f;font-size:12px;margin-top:26px}.danger{background:#fff5f5;border-color:#f3c2c2;color:#8a1f1f}@media(max-width:540px){.hero h1{font-size:23px}.tabs,.filters{overflow:auto;flex-wrap:nowrap;margin-left:-12px;margin-right:-12px;padding-left:12px}.tabs button,.filters button{white-space:nowrap}.card{padding:12px}}
</style>
</head>
<body><main id="app"></main>
<script>
const trip={title:"Noorwegen Zomerreis 2026",subtitle:"16–29 juni · Auto + ferry · onderweg bij te houden",route:"Sogndal → Skjåk → Valdres/Nord-Aurdal → Gjerstad → Kristiansand",stays:[
{id:"sogndal",label:"Sogndal",date:"16–19 jun",base:"Appartement in Sogndalsfjøra",address:"Sogndalsfjøra",maps:"https://www.google.com/maps/search/?api=1&query=Sogndalsfj%C3%B8ra",note:"Fjord, gletsjers, Molden, Fjærland en Kaupanger. Dit is je actieve startpunt.",facts:["Sognefjord is de langste fjord van Noorwegen.","Molden is een van de mooiste uitzichtwandelingen rond de Lustrafjord.","Fjærland combineert gletsjers met boekendorp-sfeer."],dist:[["Molden parkeerplaats","±32 km","±35 min"],["Solvorn","±28 km","±30 min"],["Kaupanger Stavkerk","±12 km","±15 min"],["Bøyabreen","±38 km","±40 min"],["Fjærland","±42 km","±45 min"],["Nigardsbreen","±80 km","±1u15"]],activities:[
{name:"Molden hike",type:"wandelen",prio:"must",time:"3–4 uur",km:"±7 km retour",level:"gemiddeld",drive:"±35 min · ±32 km",desc:"Uitzichtberg boven Lustrafjord. Bosstart, daarna open terrein en panorama over fjord, Solvorn en bergen. Windjas mee.",maps:"https://www.google.com/maps/search/?api=1&query=Molden+Luster+parking",komoot:"https://www.komoot.com/search/Molden%20Luster",info:"https://ut.no/"},
{name:"Solvorn na Molden",type:"dorp",prio:"leuk",time:"1 uur",drive:"±30 min vanaf verblijf / ±15 min vanaf Molden",desc:"Klein fjorddorpje met houten huizen, haven en rustige sfeer. Logische stop na Molden.",maps:"https://www.google.com/maps/search/?api=1&query=Solvorn"},
{name:"Nigardsbreen",type:"wandelen",prio:"must",time:"halve dag",km:"2–5 km",level:"makkelijk tot middel",drive:"±1u15 · ±80 km",desc:"Spectaculaire gletsjerervaring. Check boot/gids/tijden vooraf. Niet zomaar zelf het ijs op.",maps:"https://www.google.com/maps/search/?api=1&query=Nigardsbreen",komoot:"https://www.komoot.com/search/Nigardsbreen",info:"https://www.jostedal.com/"},
{name:"Bøyabreen + Fjærland",type:"wandelen",prio:"must",time:"halve dag",km:"±1 km wandelen",level:"makkelijk",drive:"±40 min · ±38 km",desc:"Korte gletsjerstop met veel resultaat. Combineer met koffie/lunch en boekwinkels in Fjærland.",maps:"https://www.google.com/maps/search/?api=1&query=B%C3%B8yabreen",komoot:"https://www.komoot.com/search/B%C3%B8yabreen"},
{name:"Kaupanger Stavkerk",type:"cultuur",prio:"leuk",time:"1 uur",drive:"±15 min · ±12 km",desc:"Historische staafkerk dichtbij Sogndal. Goede korte activiteit of regenoptie.",maps:"https://www.google.com/maps/search/?api=1&query=Kaupanger+Stave+Church"}],food:[["Dampskipskaien","Aan het water, handig voor eerste avond of koffie.","https://www.google.com/maps/search/?api=1&query=Dampskipskaien+Sogndal"],["Restauranthuset Malin","Lokale Noorse keuken in Sogndal.","https://www.google.com/maps/search/?api=1&query=Restauranthuset+Malin+Sogndal"]]},
{id:"skjak",label:"Skjåk",date:"19–23 jun",base:"Skjåk Solside",address:"Skjåk Solside, Skjåk",maps:"https://www.google.com/maps/search/?api=1&query=Skj%C3%A5k+Solside",note:"Droog bergdal tussen Breheimen, Reinheimen en Jotunheimen. Goed voor autoroutes, kloofwandelingen en Lom.",facts:["Skjåk is opvallend droog voor Noorwegen.","Lom ligt dichtbij en is ideaal voor koffie, bakkerij en staafkerk.","Sognefjellet is een verplaatsingsdag die voelt als een excursie."],dist:[["Lom","±20 km","±20 min"],["Dønfoss","±10 km","±10 min"],["Gjelbrue/Tundragjelet","±20 km","±20 min"],["Sota Sæter","±40 km","±45 min"],["Sognefjellet route","±35 km","±35 min"]],activities:[
{name:"Sognefjellet scenic route",type:"rijden",prio:"must",time:"halve dag",drive:"±35 min naar route",desc:"Een van de mooiste bergwegen van Noorwegen. Stop veel, zeker bij helder weer.",maps:"https://www.google.com/maps/search/?api=1&query=Sognefjellet",info:"https://www.nasjonaleturistveger.no/en/routes/sognefjellet/"},
{name:"Dønfoss → Gjelbrue / Tundragjelet",type:"wandelen",prio:"must",time:"2–3 uur",level:"middel",drive:"±10–20 min",desc:"Rivier, kloof en droog dennenbos. Minder toeristisch dan de bekende fjordstops.",maps:"https://www.google.com/maps/search/?api=1&query=D%C3%B8nfoss+Skj%C3%A5k",komoot:"https://www.komoot.com/search/D%C3%B8nfoss%20Gjelbrue"},
{name:"Lom Stavkyrkje + bakkerij",type:"cultuur",prio:"must",time:"1–2 uur",drive:"±20 min",desc:"Sterke combinatie: historische staafkerk, dorpje Lom en goede koffiestop.",maps:"https://www.google.com/maps/search/?api=1&query=Lom+Stave+Church"},
{name:"Sota Sæter / Breheimen",type:"wandelen",prio:"leuk",time:"halve dag",level:"middel",drive:"±45 min",desc:"Rustiger berggebied. Neem kaart/water mee; minder voorzieningen onderweg.",maps:"https://www.google.com/maps/search/?api=1&query=Sota+S%C3%A6ter",komoot:"https://www.komoot.com/search/Sota%20S%C3%A6ter"}],food:[["Grotli Høyfjellshotell","Fjellhotel, mooi als lunchstop op hoogte.","https://www.google.com/maps/search/?api=1&query=Grotli+H%C3%B8yfjellshotell"],["Lom bakkerij","Bekende stop voor koffie/broodjes.","https://www.google.com/maps/search/?api=1&query=Lom+bakeri"]]},
{id:"valdres",label:"Valdres / Nord-Aurdal",date:"23–27 jun",base:"Førsøddin 30, 2920 Nord-Aurdal",address:"Førsøddin 30, 2920 Nord-Aurdal",maps:"https://www.google.com/maps/search/?api=1&query=F%C3%B8rs%C3%B8ddin+30+2920+Nord-Aurdal",note:"Valdres is de regio; Nord-Aurdal de gemeente. Basis voor Besseggen, Mjølkevegen, Bygdin en Fagernes.",facts:["Valdres is bekend om støls, bergboerderijen en bruine kaas.","Besseggen alleen doen bij goed weer en tijdig ferry checken.","Mjølkevegen is mooi per fiets, maar delen zijn ook per auto fraai."],dist:[["Fagernes","±15–20 km","±20 min"],["Bjørgovarden","±20 km","±25 min"],["Bygdin / M/S Bitihorn","±70 km","±1u10"],["Gjendesheim/Besseggen","±85 km","±1u25"],["Valdres Folkemuseum","±20 km","±20 min"]],activities:[
{name:"Besseggen Ridge",type:"wandelen",prio:"must",time:"6–8 uur",km:"14–18 km",level:"zwaar",drive:"±1u25 · ±85 km",desc:"Topwandeling tussen Gjende en Bessvatnet. Alleen bij stabiel weer. Ferry vooraf regelen.",maps:"https://www.google.com/maps/search/?api=1&query=Gjendesheim+Besseggen",komoot:"https://www.komoot.com/search/Besseggen"},
{name:"Mjølkevegen",type:"fiets",prio:"must",time:"halve/hele dag",level:"middel",drive:"afhankelijk van etappe",desc:"Stølsroute door bergweiden. Kies een deeltraject rond Beitostølen/Valdres als 50 km te lang wordt.",maps:"https://www.google.com/maps/search/?api=1&query=Mj%C3%B8lkevegen+Valdres",komoot:"https://www.komoot.com/search/Mj%C3%B8lkevegen"},
{name:"M/S Bitihorn op Bygdin",type:"water",prio:"must",time:"2–4 uur",drive:"±1u10",desc:"Bergmeerboot op hoogte. Check vaardagen/tijden vooraf.",maps:"https://www.google.com/maps/search/?api=1&query=M%2FS+Bitihorn+Bygdin",info:"https://www.jvb.no/en/ms-bitihorn/"},
{name:"Bjørgovarden",type:"wandelen",prio:"leuk",time:"2 uur",km:"±7 km",level:"makkelijk-middel",drive:"±25 min",desc:"Rustiger wandeling met panorama over Valdres.",maps:"https://www.google.com/maps/search/?api=1&query=Bj%C3%B8rgovarden+Aurdal",komoot:"https://www.komoot.com/search/Bj%C3%B8rgovarden"}],food:[["Danebu Kongsgaard","Mooi diner met lokale sfeer. Reserveren slim.","https://www.google.com/maps/search/?api=1&query=Danebu+Kongsgaard"],["Fagernes centrum","Praktisch voor boodschappen, koffie en diner.","https://www.google.com/maps/search/?api=1&query=Fagernes+restaurant"]]},
{id:"gjerstad",label:"Gjerstad",date:"27–29 jun",base:"Løyteveien 14, 4980 Gjerstad",address:"Løyteveien 14, 4980 Gjerstad",maps:"https://www.google.com/maps/search/?api=1&query=L%C3%B8yteveien+14+4980+Gjerstad",note:"Rustige laatste stop in Agder. Bos, meren en kustplaatsjes Risør en Tvedestrand dichtbij.",facts:["Risør en Tvedestrand zijn typische witte Sørlandet-kustplaatsjes.","Gjerstad is rustiger en minder toeristisch.","Goede regio om wat gas terug te nemen voor de terugreis."],dist:[["Gjerstadvatnet","±5–10 km","±10 min"],["Solhomfjell","±20–30 km","±30 min"],["Risør","±35 km","±35 min"],["Tvedestrand","±45 km","±45 min"],["Kristiansand ferry","±130 km","±1u45"]],activities:[
{name:"Solhomfjell",type:"wandelen",prio:"must",time:"3 uur",km:"±11 km",level:"middel",drive:"±30 min",desc:"Beste wandeling in deze regio: uitzicht, bos en rustig berglandschap.",maps:"https://www.google.com/maps/search/?api=1&query=Solhomfjell+Gjerstad",komoot:"https://www.komoot.com/search/Solhomfjell"},
{name:"Risør",type:"dorp",prio:"must",time:"2–3 uur",drive:"±35 min",desc:"Witte houten huizen, haven, terrassen. Beste avond-/middagstop aan de kust.",maps:"https://www.google.com/maps/search/?api=1&query=Ris%C3%B8r"},
{name:"Tvedestrand",type:"dorp",prio:"leuk",time:"1–2 uur",drive:"±45 min",desc:"Kleiner en rustiger dan Risør. Leuk voor koffie en havenwandeling.",maps:"https://www.google.com/maps/search/?api=1&query=Tvedestrand"},
{name:"Gjerstadvatnet",type:"water",prio:"leuk",time:"30–60 min",drive:"±10 min",desc:"Rustig meer voor zwemmen of korte pauze.",maps:"https://www.google.com/maps/search/?api=1&query=Gjerstadvatnet"}],food:[["Risør haven","Kustrestaurants, vis en terras.","https://www.google.com/maps/search/?api=1&query=Ris%C3%B8r+havn+restaurant"],["Brokelandheia","Praktisch bij E18, snelle optie.","https://www.google.com/maps/search/?api=1&query=Brokelandheia+restaurant"]]}]};
const icons={wandelen:'🥾',water:'💧',fiets:'🚴',rijden:'🚗',cultuur:'🏛️',dorp:'🏘️'};
let tab='planner',filter='alle';
const state=JSON.parse(localStorage.noorwegenStateV2||'{}');state.done=state.done||{};state.notes=state.notes||{};state.diary=state.diary||{};state.custom=state.custom||[];
function save(){localStorage.noorwegenStateV2=JSON.stringify(state)}
function acts(){return trip.stays.flatMap(s=>[...s.activities,...state.custom.filter(c=>c.stay===s.id)].map(a=>({...a,stay:s})));}
function key(a){return (a.stay?.id||a.stay)+'__'+a.name.replace(/\W+/g,'_')}
function render(){const a=acts(),done=Object.values(state.done).filter(Boolean).length;document.getElementById('app').innerHTML=`<section class="hero"><div class="small">Persoonlijke reisplanner</div><h1>🇳🇴 ${trip.title}</h1><div class="sub">${trip.subtitle}</div><div class="stats"><span class="pill">${trip.stays.length} verblijven</span><span class="pill">${a.length} activiteiten</span><span class="pill">${a.filter(x=>x.prio==='must').length} must-do's</span><span class="pill">${done} gedaan</span></div></section><div class="tabs"><button class="${tab==='planner'?'active':''}" onclick="tab='planner';render()">🗺 Planner</button><button class="${tab==='dagboek'?'active':''}" onclick="tab='dagboek';render()">📖 Dagboek</button><button class="${tab==='toevoegen'?'active':''}" onclick="tab='toevoegen';render()">➕ Toevoegen</button><button class="${tab==='info'?'active':''}" onclick="tab='info';render()">ℹ️ Info</button></div>${tab==='planner'?planner():tab==='dagboek'?diary():tab==='toevoegen'?addForm():info()}<div class="footer">Alles wat je afvinkt, noteert of toevoegt blijft op dit toestel bewaard.</div>`}
function planner(){return `<div class="route">🗺️ <b>Route:</b> ${trip.route}<br><span class="small">Gebruik filters; tik op Maps/Komoot voor navigatie op iPhone.</span></div><div class="filters"><button class="${filter==='alle'?'active':''}" onclick="filter='alle';render()">alles</button><button class="${filter==='must'?'active':''}" onclick="filter='must';render()">⭐ must-do</button>${Object.keys(icons).map(t=>`<button class="${filter===t?'active':''}" onclick="filter='${t}';render()">${icons[t]} ${t}</button>`).join('')}</div>`+trip.stays.map(stayCard).join('')}
function stayCard(s){let list=[...s.activities,...state.custom.filter(c=>c.stay===s.id)];list=list.filter(a=>filter==='alle'||(filter==='must'?a.prio==='must':a.type===filter));return `<section class="card"><div class="head"><h2>📍 ${s.label}</h2><span class="date">${s.date}</span></div><p class="note"><b>Verblijf:</b> ${s.base}<br>${s.note}</p><div class="links"><a class="btn" target="_blank" href="${s.maps}">📍 accommodatie</a></div><div class="section">Afstand vanaf accommodatie</div><div class="distance">${s.dist.map(d=>`<div class="box"><b>${d[0]}</b><span>${d[1]}</span><br><span>${d[2]}</span></div>`).join('')}</div><div class="facts"><b>💡 Weetjes</b><ul>${s.facts.map(f=>`<li>${f}</li>`).join('')}</ul></div><div class="section">Activiteiten (${list.length})</div>${list.map(a=>activity({...a,stay:s})).join('')||'<p class="muted">Geen activiteiten voor dit filter.</p>'}<div class="section">🍽️ Eten / koffie</div><div class="grid">${s.food.map(f=>`<div class="restaurant"><b>${f[0]}</b><p class="desc">${f[1]}</p><a class="btn small" target="_blank" href="${f[2]}">📍 Maps</a></div>`).join('')}</div></section>`}
function activity(a){const k=key(a);return `<div class="activity ${state.done[k]?'done':''}"><div class="activityTop"><input type="checkbox" ${state.done[k]?'checked':''} onchange="state.done['${k}']=this.checked;save();render()"><div><h3>${icons[a.type]||'✦'} ${a.name}</h3><div class="chips"><span class="tag">${a.prio==='must'?'⭐ must-do':'👍 leuk'}</span><span class="tag">${a.type||'eigen'}</span>${a.drive?`<span class="tag">🚗 ${a.drive}</span>`:''}${a.time?`<span class="tag">⏱ ${a.time}</span>`:''}${a.km?`<span class="tag">📏 ${a.km}</span>`:''}${a.level?`<span class="tag">🥾 ${a.level}</span>`:''}</div><p class="desc">${a.desc||''}</p><div class="links">${a.maps?`<a class="btn small" target="_blank" href="${a.maps}">📍 Maps</a>`:''}${a.komoot?`<a class="btn small" target="_blank" href="${a.komoot}">🧭 Komoot</a>`:''}${a.info?`<a class="btn small" target="_blank" href="${a.info}">🌐 Info</a>`:''}${a.custom?`<button class="btn small danger" onclick="removeCustom('${a.id}')">verwijder</button>`:''}</div><textarea class="notes" placeholder="Notitie bij deze activiteit..." oninput="state.notes['${k}']=this.value;save()">${state.notes[k]||''}</textarea></div></div></div>`}
function diary(){const days=['Woensdag 18 juni - Molden / Sogndal','Donderdag 19 juni - Sogndal','Vrijdag 20 juni - rit naar Skjåk','Zaterdag 21 juni - Skjåk','Zondag 22 juni - Skjåk','Maandag 23 juni - naar Valdres','Dinsdag 24 juni - Valdres','Woensdag 25 juni - Valdres','Donderdag 26 juni - Valdres','Vrijdag 27 juni - naar Gjerstad','Zaterdag 28 juni - Gjerstad','Zondag 29 juni - terugreis'];return `<section class="card"><h2>📖 Reisdagboek</h2><p class="note">Schrijf per dag wat je deed, weer, restaurant, kosten, hoogtepunten en wat je later wilt onthouden.</p>${days.map(d=>`<div class="diary"><b>${d}</b><textarea placeholder="Weer, route, activiteiten, eten, kosten, hoogtepunt..." oninput="state.diary['${d}']=this.value;save()">${state.diary[d]||''}</textarea></div>`).join('')}</section>`}
function addForm(){return `<section class="card"><h2>➕ Zelf activiteit toevoegen</h2><p class="note">Voeg iets toe dat je onderweg ziet. Later kun je mij de naam sturen; dan geef ik extra info, afstand, Komoot/Maps en beoordeling.</p><div class="form"><label>Bij verblijf</label><select id="addStay">${trip.stays.map(s=>`<option value="${s.id}">${s.label}</option>`).join('')}</select><label>Naam</label><input id="addName" placeholder="bijv. Feigefossen"><label>Type</label><select id="addType"><option value="wandelen">wandelen</option><option value="dorp">dorp</option><option value="water">water</option><option value="fiets">fiets</option><option value="rijden">rijden</option><option value="cultuur">cultuur</option></select><label>Eigen notitie</label><textarea id="addDesc" placeholder="Waarom wil je dit bewaren?"></textarea><button onclick="addCustom()">Toevoegen</button></div></section>`}
function addCustom(){const name=document.getElementById('addName').value.trim();if(!name)return alert('Vul een naam in');state.custom.push({id:'c'+Date.now(),custom:true,stay:document.getElementById('addStay').value,name,type:document.getElementById('addType').value,prio:'leuk',desc:document.getElementById('addDesc').value,drive:'nog aanvullen',maps:'https://www.google.com/maps/search/?api=1&query='+encodeURIComponent(name+' Norway'),komoot:'https://www.komoot.com/search/'+encodeURIComponent(name)});save();tab='planner';render()}
function removeCustom(id){state.custom=state.custom.filter(c=>c.id!==id);save();render()}
function info(){return `<section class="card"><h2>ℹ️ Hoe gebruik je dit</h2><p class="note">Deze planner werkt als één losse webpagina. Op iPhone kun je hem via Safari toevoegen aan je beginscherm. Je dagboek, afvinkjes en eigen toevoegingen blijven lokaal op je toestel staan.</p><div class="facts"><b>Wat jij kunt sturen in de chat:</b><ul><li>“Toevoegen: Feigefossen”</li><li>“Molden gedaan, maak dagboek”</li><li>“Wat is dichtbij Skjåk Solside bij regen?”</li><li>“Verrijk deze activiteit met Komoot en Maps”</li></ul></div></section>`}
render();
</script></main></body></html>
