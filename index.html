  lom_centre:["local","short"], bakeriet:["local","short"], lom_stav:["popular","short"], vegaskjelet:["local"], tronoberget:["local","short"], klimapark:["popular"], donfoss:["local","short"], gjelbrue:["local"], sognefjellet:["popular"],
  besseggen:["popular"], bygdin:["local"], mjolkevegen:["popular"], valdresmuseum:["local","rain"], syndin:["local"], danebu:["local","short"], smak_valdres:["local","short"],
  solhomfjell:["local"], risor:["local"], tvedestrand:["local"], ferry_krs:["short"], kolding_stop:["short"]
};
function labelHtml(a){let labs=ACT_LABELS[a.id]||[];let txt={local:"⭐ lokaal",popular:"🔥 highlight",rain:"☔ regen",short:"⚡ korte stop"};let cls={local:"local",popular:"hot",rain:"rain",short:"stop"};return labs.map(l=>`<span class="pill ${cls[l]}">${txt[l]}</span>`).join("");}

function r(name,desc,q){return {name,desc,maps:mapsSearch(q),menu:menuSearch(q)}}
function act(id,stayId,name,type,prio,status,date,order,drive,time,km,level,desc,q,kq){let c=COORDS[id]||[];return {id,stayId,name,type,prio,status,date,order,drive,time,km,level,desc,maps:mapsSearch(q),komoot:`https://www.komoot.com/search/${enc(kq||q)}`,lat:c[0]||null,lon:c[1]||null}}
const typeIcon={wandelen:"🥾",gletsjer:"🏔️",water:"💧",fiets:"🚴",rijden:"🚗",cultuur:"🏛️",dorp:"🏘️",eten:"☕"};
let state=load();let tab="planning";let activeStay="all";let showPlan=true;let statusFilters={plan:true,todo:true,done:true,skip:false};let map=null;

function parseGptInfo(txt){
  const obj={};
  const map={"naam":"name","activiteit":"name","categorie":"type","type":"type","omschrijving":"desc","beschrijving":"desc","afstand":"drive","reistijd":"drive","duur":"time","lengte":"km","moeilijkheid":"level","niveau":"level","google maps":"maps","maps":"maps","komoot":"komoot","restaurant/koffie":"foodNote","regenalternatief":"rainAlt","beoordeling":"rating","coördinaten":"coords","coordinaten":"coords","afbeelding zoekterm":"imageQuery"};
  txt.split(/\n/).forEach(line=>{const m=line.match(/^([^:]+):\s*(.*)$/);if(!m)return;const k=m[1].trim().toLowerCase();const v=m[2].trim();const f=map[k];if(f&&v)obj[f]=v;});
  if(obj.coords){const m=obj.coords.match(/(-?\d+(?:\.\d+)?)\s*,\s*(-?\d+(?:\.\d+)?)/);if(m){obj.lat=Number(m[1]);obj.lon=Number(m[2]);}}
  if(obj.type){const t=obj.type.toLowerCase();obj.type=t.includes("glets")||t.includes("ijs")?"gletsjer":t.includes("fiets")?"fiets":t.includes("water")?"water":t.includes("kerk")||t.includes("cultuur")?"cultuur":t.includes("dorp")||t.includes("stad")?"dorp":t.includes("rij")||t.includes("route")?"rijden":t.includes("eten")||t.includes("koffie")?"eten":"wandelen";}
  return obj;
}
function mergeEnrich(a){const k=key(a);const extra=state.enrich?.[k]||{};return {...a,...extra,stay:a.stay};}
function importGptInfo(k,txt){if(!txt.trim())return alert("Plak eerst GPT-info.");state.enrich=state.enrich||{};state.enrich[k]={...(state.enrich[k]||{}),...parseGptInfo(txt)};state.notes=state.notes||{};state.notes[k]=txt;save();render();}

function load(){try{return JSON.parse(localStorage.getItem(STORE)||"{}")}catch(e){return {}}}
function save(){state._lastSaved=new Date().toISOString();localStorage.setItem(STORE,JSON.stringify(state))}
function savedLabel(){return state._lastSaved?`Opgeslagen ${new Date(state._lastSaved).toLocaleTimeString("nl-NL",{hour:"2-digit",minute:"2-digit"})}`:"Nog niet opgeslagen"}
function st(id){return trip.stays.find(s=>s.id===id)}
function key(a){return a.stayId+"__"+a.id}
function getStatus(a){return state.status?.[key(a)]||a.status||"todo"}
function setStatus(k,v){state.status=state.status||{};state.status[k]=v;save();render()}
function getDate(a){return state.dates?.[key(a)]??a.date??""}
function setDate(k,v){state.dates=state.dates||{};if(v){state.dates[k]=v}else{delete state.dates[k]};save();render()}
function getOrder(a){let o=state.order?.[key(a)];return o!==undefined?Number(o):(a.order||99)}
function setOrder(k,v){state.order=state.order||{};state.order[k]=Number(v)||99;save();render()}
function notes(k){return state.notes?.[k]||""}
function allActs(){let custom=(state.custom||[]);return [...trip.activities,...custom].map(a=>mergeEnrich({...a,stay:st(a.stayId)})).filter(a=>a.stay)}
function statusBadge(a){
  let s=getStatus(a);
  let txt={todo:"🟢 Gepland",plan:"📌 Vast",done:"✅ Gedaan",skip:"⛔ Overgeslagen"}[s]||s;
  return `<span class="statusBadge status-${s}">${txt}</span>`;
}

function visibleByStatus(a){let s=getStatus(a);return !!statusFilters[s]}
function e(s){return String(s??"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]))}
function dateLbl(v){if(!v)return "geen datum";let d=new Date(v+"T12:00");return d.toLocaleDateString("nl-NL",{weekday:"short",day:"numeric",month:"short"})}
function stayRoute(a){return mapsRoute(a.stay.address,a.name+" Norway")}
function hereRoute(a){return `https://www.google.com/maps/dir/?api=1&destination=${enc(a.name+' Norway')}`}
function dayDates(){return travelDays().map(x=>x.date)}
function dayNo(d){let start=new Date('2026-06-15T12:00:00');let cur=new Date(d+'T12:00:00');return Math.round((cur-start)/86400000)+1}

function travelDays(){
  return [
    {date:'2026-06-15',stayId:'sogndal',title:'Vertrek thuis 18:00 · ferry naar Bergen'},
    {date:'2026-06-16',stayId:'sogndal',title:'Aankomst Bergen 13:00 · Sogndal 18:00'},
    {date:'2026-06-17',stayId:'sogndal',title:'Sogndal'},
    {date:'2026-06-18',stayId:'sogndal',title:'Sogndal'},
    {date:'2026-06-19',stayId:'sogndal',title:'Sogndal'},
    {date:'2026-06-20',stayId:'skjak',title:'Skjåk / Lom'},
    {date:'2026-06-21',stayId:'skjak',title:'Skjåk / Klimapark'},
    {date:'2026-06-22',stayId:'skjak',title:'Skjåk'},
    {date:'2026-06-23',stayId:'valdres',title:'Reisdag Skjåk → Valdres'},
    {date:'2026-06-24',stayId:'valdres',title:'Valdres lokaal'},
    {date:'2026-06-25',stayId:'valdres',title:'Valdres'},
    {date:'2026-06-26',stayId:'valdres',title:'Valdres'},
    {date:'2026-06-27',stayId:'gjerstad',title:'Reisdag Valdres → Gjerstad'},
    {date:'2026-06-28',stayId:'gjerstad',title:'Gjerstad / Sørlandet'},
    {date:'2026-06-29',stayId:'ferry',title:'Kristiansand Ferry → Kolding'},
    {date:'2026-06-30',stayId:'kolding',title:'Kolding → huis'}
  ];
}

function groupedPlanning(){let m={};allActs().filter(a=>getDate(a)).filter(a=>activeStay==='all'||a.stayId===activeStay).filter(visibleByStatus).forEach(a=>{let d=getDate(a);(m[d]=m[d]||[]).push(a)});Object.values(m).forEach(list=>list.sort((a,b)=>getOrder(a)-getOrder(b)||a.name.localeCompare(b.name)));return m}
function render(){let app=document.getElementById('app');app.innerHTML=`<section class="hero"><h1>🇳🇴 Noorwegen Zomerreis 2026</h1><div class="version">15–30 juni · laatste update ${LAST_UPDATE}</div></section><nav class="tabs">${tb('planning','Planning')}${tb('map','Kaart')}${tb('stays','Verblijven')}${tb('add','Toevoegen')}${tb('more','Meer')}</nav>${tab==='planning'?planningView():tab==='map'?mapView():tab==='stays'?staysView():tab==='add'?addView():moreView()}<div class="footer">Gegevens blijven lokaal op je iPhone bewaard. Maak backup vóór uploaden.</div>`; if(tab==='map')setTimeout(initMap,250)}
function tb(id,l){return `<button class="${tab===id?'active':''}" onclick="tab='${id}';render()">${l}</button>`}
function stayFilter(){return `<div class="filtersRow"><select onchange="activeStay=this.value;render()"><option value="all" ${activeStay==='all'?'selected':''}>Alle accommodaties</option>${trip.stays.map(s=>`<option value="${s.id}" ${activeStay===s.id?'selected':''}>${s.label}</option>`).join('')}</select></div>`}
function statusRow(){let labels={todo:'Gepland',plan:'Vast gepland',done:'Gedaan',skip:'Overgeslagen'};return `<div class="filtersRow">${Object.keys(labels).map(k=>`<label class="check ${statusFilters[k]?'on':''}"><input type="checkbox" ${statusFilters[k]?'checked':''} onchange="statusFilters.${k}=this.checked;render()">${labels[k]}</label>`).join('')}</div>`}
function todayView(){let a=allActs().filter(x=>x.stayId===activeStay).filter(visibleByStatus).filter(x=>getStatus(x)!=='skip');let today=todayISO();let now=a.filter(x=>getDate(x)===today || getStatus(x)==='plan').sort((x,y)=>getOrder(x)-getOrder(y));let tomorrowDate=new Date();tomorrowDate.setDate(tomorrowDate.getDate()+1);let tom=tomorrowDate.toISOString().slice(0,10);let morgen=a.filter(x=>getDate(x)===tom).sort((x,y)=>getOrder(x)-getOrder(y));let later=a.filter(x=>getDate(x)&&getDate(x)!==today&&getDate(x)!==tom).sort((x,y)=>getDate(x).localeCompare(getDate(y))||getOrder(x)-getOrder(y));return `<section class="card"><h2>Vandaag</h2>${stayFilter()}${statusRow()}<p class="muted">Rustig overzicht: alleen gekozen accommodatie en relevante status.</p>${sec('Vandaag / vast gepland',now)}${sec('Morgen',morgen)}${sec('Later gepland',later.slice(0,8))}</section>`}
function sec(title,list){return `<div class="section">${title}</div>${list.length?list.map(activityCard).join(''):`<p class="muted">Niets gevonden.</p>`}`}

function activityDetailsBody(a){
  let k=key(a),s=getStatus(a);
  return `<div class="activityBody"><div class="chips"><span class="tag">${e(a.type)}</span>${a.km?`<span class="tag">${e(a.km)}</span>`:''}${a.level?`<span class="tag">${e(a.level)}</span>`:''}${labelHtml(a)}</div><p>${e(a.desc)}</p>${a.foodNote?`<div class="info"><b>☕/🍽 Tip</b><br>${e(a.foodNote)}</div>`:''}${a.rainAlt?`<div class="info warn"><b>☔ Regenalternatief</b><br>${e(a.rainAlt)}</div>`:''}${a.rating?`<span class="pill">${e(a.rating)}</span>`:''}<div class="links"><a class="btn small" target="_blank" href="${a.maps}">Maps</a><a class="btn small" target="_blank" href="${a.komoot}">Komoot</a><a class="btn small" target="_blank" href="${stayRoute(a)}">Route verblijf</a><a class="btn small" target="_blank" href="${hereRoute(a)}">Route vanaf hier</a></div><div class="status"><button onclick="setStatus('${k}','todo')" class="${s==='todo'?'active':''}">gepland</button><button onclick="setStatus('${k}','plan')" class="${s==='plan'?'active':''}">vast</button><button onclick="setStatus('${k}','done')" class="${s==='done'?'active':''}">gedaan</button><button onclick="setStatus('${k}','skip')" class="${s==='skip'?'active':''}">overslaan</button></div><details><summary>📅 Plan / datum</summary><div class="links"><input type="date" value="${getDate(a)}" onchange="setDate('${k}',this.value)"><button onclick="setDate('${k}','')">wis datum</button><input type="number" min="1" style="width:90px" value="${getOrder(a)}" onchange="setOrder('${k}',this.value);render()" placeholder="volgorde"></div></details><details><summary>✨ GPT-info plakken / activiteit verrijken</summary><textarea id="g_${k}" placeholder="Plak compacte GPT-info met Naam:, Omschrijving:, Reistijd:, Google Maps:, Komoot:, Coördinaten: ...">${e(notes(k))}</textarea><button onclick="importGptInfo('${k}',document.getElementById('g_${k}').value)">importeer velden</button></details></div>`;
}

function activityCard(a){return `<details class="activity"><summary><div class="titleRow"><span>${typeIcon[a.type]||'📍'}</span><div style="flex:1"><b>${e(a.name)}</b><div class="meta">${e(a.stay.label)} · ${dateLbl(getDate(a))} · ${e(a.drive||'')}</div><div>${statusBadge(a)}${labelHtml(a)}</div></div></div></summary>${activityDetailsBody(a)}</details>`}
function unplannedActs(){
  return allActs().filter(a=>!getDate(a)).filter(a=>activeStay==='all'||a.stayId===activeStay).filter(visibleByStatus).sort((a,b)=>(a.stay.label||'').localeCompare(b.stay.label||'')||a.name.localeCompare(b.name));
}
function unplannedBlock(){
  let list=unplannedActs();
  return `<div class="day unplanned"><div class="dayHead"><h2><span class="badge c-default">?</span> Niet ingepland</h2><span class="dayCount">${list.length} activiteit(en)</span></div><p class="muted">Activiteiten zonder datum. Kies hier direct een datum; status wijzig je onder Details.</p>${list.length?list.map(a=>`<div class="planItem"><div class="badge ${a.stay.color}">?</div><div style="flex:1"><b>${typeIcon[a.type]||'📍'} ${e(a.name)}</b><div class="meta">${e(a.stay.label)} · ${e(a.drive||'')}</div><div>${statusBadge(a)}${labelHtml(a)}</div><div class="quickPlan"><input type="date" value="${getDate(a)}" onchange="setDate('${key(a)}',this.value)"></div><details class="planDetails"><summary>Details / status wijzigen</summary>${activityDetailsBody(a)}</details></div></div>`).join(''):`<div class="box muted">Geen niet-geplande activiteiten met deze filters.</div>`}</div>`;
}
function planningView(){let m=groupedPlanning();let days=travelDays().filter(d=>activeStay==='all'||d.stayId===activeStay);return `<section class="card"><h2>Planning</h2>${stayFilter()}${statusRow()}<p class="muted">Status, datum en labels zijn direct zichtbaar. Datum of volgorde wijzigen wordt direct opgeslagen. ↑/↓ werkt betrouwbaarder dan slepen op iPhone.<div class="saveNote">${savedLabel()}</div></p>${days.map(d=>dayBlock(d.date,m[d.date]||[],d)).join('')}${unplannedBlock()}</section>`}
function dayBlock(d,list,meta){let dn=dayNo(d);let stay=st(meta?.stayId)||{label:meta?.title||'',color:'c-default'};return `<div class="day"><div class="dayHead"><h2><span class="badge ${stay.color}">D${dn}</span> ${dateLbl(d)} <span class="muted small">· ${e(meta?.title||stay.label)}</span></h2><span class="dayCount">${list.length} activiteit(en)</span></div>${list.length?list.map((a,i)=>`<div class="planItem" draggable="true" ondragstart="dragStart(event,'${key(a)}')" ondrop="dropOn(event,'${key(a)}','${d}')" ondragover="event.preventDefault()"><div class="badge ${a.stay.color}">${dn}-${i+1}</div><div style="flex:1"><b>${typeIcon[a.type]||'📍'} ${e(a.name)}</b><div class="meta">${e(a.stay.label)} · ${dateLbl(getDate(a))} · ${e(a.drive||'')}</div><div>${statusBadge(a)}${labelHtml(a)}</div><div class="overviewActions"><button onclick="move('${key(a)}','${d}',-1)">↑</button><button onclick="move('${key(a)}','${d}',1)">↓</button><input type="date" value="${getDate(a)}" onchange="setDate('${key(a)}',this.value)"><button onclick="setDate('${key(a)}','')">geen datum</button></div><details class="planDetails"><summary>Details / status wijzigen</summary>${activityDetailsBody(a)}</details></div><span class="drag">☰</span></div>`).join(''):`<div class="box muted">Nog niets gepland</div>`}</div>`}
let dragged=null;function dragStart(ev,k){dragged=k}function dropOn(ev,k,d){ev.preventDefault();if(!dragged||dragged===k)return;let list=groupedPlanning()[d]||[];let keys=list.map(key),from=keys.indexOf(dragged),to=keys.indexOf(k);if(from<0||to<0)return;keys.splice(to,0,keys.splice(from,1)[0]);keys.forEach((kk,i)=>setOrder(kk,i+1));save();render()}function move(k,d,delta){let list=groupedPlanning()[d]||[];let keys=list.map(key),i=keys.indexOf(k),j=i+delta;if(i<0||j<0||j>=keys.length)return;[keys[i],keys[j]]=[keys[j],keys[i]];keys.forEach((kk,n)=>setOrder(kk,n+1));save();render()}
function mapView(){return `<section class="card"><h2>Kaart</h2>${stayFilter()}${statusRow()}<p class="muted">Kleur = accommodatie. Label = reisdag-volgorde. Alleen activiteiten met coördinaten krijgen een pin; Maps blijft leidend.</p><div id="map"></div></section>`}
function initMap(){if(!window.L)return; if(map)map.remove();map=L.map('map',{scrollWheelZoom:false});L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:18,attribution:'© OpenStreetMap'}).addTo(map);let pts=[];trip.stays.filter(s=>activeStay==='all'||s.id===activeStay).forEach(s=>{addPin(s.lat,s.lon,s.color,'🏠',`<b>${s.label}</b><br>${s.address}<br><a href="${mapsSearch(s.address)}" target="_blank">Maps</a>`);pts.push([s.lat,s.lon])});Object.entries(groupedPlanning()).forEach(([d,list])=>list.forEach((a,i)=>{if(!a.lat||!a.lon)return;let label=`${dayNo(d)}-${i+1}`;addPin(a.lat,a.lon,a.stay.color,label,`<b>${dateLbl(d)} · ${a.name}</b><br>${a.stay.label}<br>${a.drive||''}<br><a href="${a.maps}" target="_blank">Maps</a>`);pts.push([a.lat,a.lon])}));if(pts.length)map.fitBounds(pts,{padding:[25,25]})}
function addPin(lat,lon,cls,label,pop){let icon=L.divIcon({className:'',html:`<div class="pin ${cls}">${label}</div>`,iconSize:[34,34],iconAnchor:[17,17]});L.marker([lat,lon],{icon}).addTo(map).bindPopup(pop)}
function staysView(){return `<section class="card"><h2>Verblijven</h2>${trip.stays.map(s=>`<div class="card stayCard"><h2>${e(s.label)}</h2><p><b>${e(s.base)}</b><br>${e(s.address)}</p><div class="links"><a class="btn" target="_blank" href="${mapsSearch(s.address)}">Maps</a><a class="btn" target="_blank" href="${mapsSearch('supermarket near '+s.address)}">🛒 supermarkt</a><a class="btn" target="_blank" href="${mapsSearch('cafe near '+s.address)}">☕ koffie</a><a class="btn" target="_blank" href="${mapsSearch('restaurant near '+s.address)}">🍽 restaurants</a><a class="btn" target="_blank" href="${mapsSearch('EV charging near '+s.address)}">🔌 laden</a></div><div class="info"><b>Weetjes / omgeving</b><ul>${s.facts.map(f=>`<li>${e(f)}</li>`).join('')}</ul></div><details ${showPlan?'open':''}><summary>Aanbevolen plan / tips</summary><ul>${s.tips.map(t=>`<li>${e(t)}</li>`).join('')}</ul></details><div class="section">☕ Koffie & 🍽 diner</div><div class="grid">${s.food.map(f=>`<div class="box"><b>${e(f.name)}</b><p>${e(f.desc)}</p><div class="links"><a class="btn small" target="_blank" href="${f.maps}">Maps</a><a class="btn small" target="_blank" href="${f.menu}">Menu/site</a></div></div>`).join('')}</div></div>`).join('')}</section>`}
function addView(){return `<section class="card"><h2>Toevoegen</h2><p class="muted">Voeg eerst alleen naam/link, accommodatie en datum toe. Open daarna de activiteit en plak één GPT-blok om velden automatisch te vullen.</p><div class="grid"><label>Accommodatie<br><select id="as">${trip.stays.map(s=>`<option value="${s.id}">${s.label}</option>`).join('')}</select></label><label>Naam of link<br><input id="an" placeholder="Tronoberget of Komoot-link"></label><label>Datum<br><input id="ad" type="date"></label><label>Type<br><select id="at">${Object.keys(typeIcon).map(t=>`<option value="${t}">${typeIcon[t]} ${t}</option>`).join('')}</select></label></div><button class="primary" onclick="addAct()">Toevoegen</button></section>`}
function addAct(){let name=document.getElementById('an').value.trim();if(!name)return alert('Naam invullen');let stayId=document.getElementById('as').value;let id='custom_'+Date.now();let a={id,stayId,name,type:document.getElementById('at').value,prio:'leuk',status:'todo',date:document.getElementById('ad').value,order:99,drive:'aanvullen',time:'',km:'',level:'',desc:'Eigen toevoeging. Verrijk met GPT-info.',maps:mapsSearch(name+' Norway'),komoot:'https://www.komoot.com/search/'+enc(name)};state.custom=state.custom||[];state.custom.push(a);save();tab='planning';render()}
function moreView(){return `<section class="card"><h2>Meer</h2><div class="info"><b>Reisregels / achtergrond</b><ul><li>Op verblijfsdagen liever niet de hele dag autorijden.</li><li>Lange ritten horen vooral op verplaatsingsdagen.</li><li>Rustige dagen: één hoofdactiviteit + koffie/lunch + kleine stop.</li></ul></div><div class="section">Verplaatsingsdagen</div>${trip.routes.map(x=>`<div class="box"><b>${e(x.title)}</b><p>${e(x.desc)}</p><a class="btn small" target="_blank" href="${mapsRouteWay(x.from,x.to,x.stops)}">Google route</a></div>`).join('')}<div class="section">Nog op de lijst</div><div class="info backlog"><ul>
<li><b>Tickets koppelen aan activiteiten</b> — later: PDF/foto/link per activiteit bewaren.</li>
<li><b>Offline/PWA verder uitwerken</b> — app-cache/service worker, update-melding, offline iconen en eventueel offline kaartfallback.</li>
<li><b>Activiteitcoördinaten verder verfijnen</b> — alleen waar exact bekend; geen misleidende pins.</li>
<li><b>Foto’s koppelen</b> — bewust uitgesteld.</li>
</ul></div><div class="section">Backup</div><button onclick="downloadBackup()">Backup downloaden</button><button onclick="copyBackup()">Backup kopiëren</button><details><summary>Wijzigingslog</summary><p>${LAST_UPDATE}: rustige 2.0 indeling, planning met slepen, exacte adressen, menu-links, ferry/Kolding, minder startinformatie.</p></details></section>`}
function downloadBackup(){let b=new Blob([JSON.stringify(state,null,2)],{type:'application/json'}),u=URL.createObjectURL(b),a=document.createElement('a');a.href=u;a.download='reisplanner-backup.json';a.click();URL.revokeObjectURL(u)}function copyBackup(){navigator.clipboard.writeText(JSON.stringify(state,null,2));alert('Backup gekopieerd')}
render();
</script></main></body></html>
