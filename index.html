<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Noorwegen reisgids Remco</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
:root{--bg:#eef4f7;--card:#fff;--ink:#102033;--muted:#667085;--blue:#2563eb;--green:#0f766e;--line:#d9e2ea;--shadow:0 12px 32px rgba(16,24,40,.12);--r:22px}*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:var(--bg);color:var(--ink);line-height:1.45}a{text-decoration:none;color:inherit}.hero{padding:26px 16px 18px;background:linear-gradient(135deg,#071626,#123a78 55%,#0f766e);color:white;position:sticky;top:0;z-index:20;box-shadow:var(--shadow)}.wrap{max-width:1180px;margin:auto}.top{display:flex;justify-content:space-between;gap:16px;align-items:flex-start}.top h1{font-size:clamp(27px,6vw,52px);margin:0;letter-spacing:-.05em}.sub{color:#dbeafe;margin:8px 0 0;max-width:780px}.pill{display:inline-flex;gap:7px;align-items:center;border:1px solid rgba(255,255,255,.25);background:rgba(255,255,255,.13);border-radius:999px;padding:8px 12px;white-space:nowrap;font-weight:700}.tabs{display:flex;gap:8px;overflow:auto;margin-top:16px}.tabs button,.filter button{border:1px solid rgba(255,255,255,.28);background:rgba(255,255,255,.13);color:white;border-radius:999px;padding:9px 13px;font-weight:800;white-space:nowrap}.tabs button.active{background:white;color:#123a78}main{padding:16px}.grid{display:grid;grid-template-columns:repeat(12,1fr);gap:14px}.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);padding:16px}.wide{grid-column:span 12}.half{grid-column:span 6}.third{grid-column:span 4}@media(max-width:820px){.half,.third{grid-column:span 12}.hero{position:relative}.top{display:block}.pill{margin-top:10px}}h2{margin:0 0 12px;font-size:24px;letter-spacing:-.02em}h3{margin:0 0 6px;font-size:19px}.muted{color:var(--muted)}.row{display:flex;flex-wrap:wrap;gap:8px;align-items:center}.btn{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);background:#fff;border-radius:13px;padding:9px 11px;font-weight:800;color:#172033}.btn.blue{background:var(--blue);color:white;border-color:var(--blue)}.btn.green{background:var(--green);color:white;border-color:var(--green)}.btn.dark{background:#111827;color:white;border-color:#111827}.tag{display:inline-flex;align-items:center;gap:4px;background:#eef4ff;color:#1d4ed8;border:1px solid #c7d7fe;border-radius:999px;padding:4px 9px;font-size:12px;font-weight:800}.tag.ok{background:#ecfdf3;color:#067647;border-color:#bbf7d0}.tag.warn{background:#fffbeb;color:#92400e;border-color:#fde68a}.item{border-top:1px solid var(--line);padding-top:14px;margin-top:14px}.item:first-child{border-top:0;margin-top:0;padding-top:0}.photo{height:180px;border-radius:18px;background:#dbeafe center/cover no-repeat;margin:-2px -2px 13px}.small{font-size:13px}.filter{display:flex;gap:8px;overflow:auto;margin:8px 0 14px}.filter button{color:#172033;background:white;border-color:var(--line)}.filter button.active{background:#111827;color:white}.weather{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.wbox{border:1px solid var(--line);border-radius:16px;padding:12px;background:#f8fafc}.wbig{font-size:26px;font-weight:900}.map{height:520px;border-radius:20px;overflow:hidden;border:1px solid var(--line)}@media(max-width:700px){.map{height:440px}.weather{grid-template-columns:repeat(2,1fr)}}input,textarea,select{width:100%;border:1px solid var(--line);border-radius:14px;padding:12px;font:inherit}.note{border-left:5px solid var(--green);background:#f0fdfa;border-radius:13px;padding:12px}.footer{text-align:center;color:var(--muted);font-size:13px;padding:24px}.hidden{display:none!important}
</style>
</head>
<body>
<header class="hero"><div class="wrap"><div class="top"><div><h1>🇳🇴 Noorwegen reisgids</h1><p class="sub">Route zonder overnachting op de boot. Focus op wandelen, cultuur, natuur, kaart, live weer, activiteiten en directe vragen aan ChatGPT.</p></div><span class="pill" id="currentPill">📍 Vandaag</span></div><nav class="tabs" id="tabs"></nav></div></header>
<main class="wrap" id="app"></main><footer class="footer">Tip iPhone: Delen → Zet op beginscherm. Kaarten en weer gebruiken internet.</footer>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const img=q=>`https://source.unsplash.com/1000x700/?${encodeURIComponent(q)}`;
const places=[
{id:'sogndal',name:'Sogndal / Sogndalsfjøra',dates:'17–19 juni',nights:'2 nachten vanaf nu',lat:61.2296,lon:7.1018,addr:'Sogndalsfjøra, Noorwegen',map:'https://maps.google.com/?q=Sogndalsfjora,Norway',about:'Levendig fjordstadje en goede basis voor Lustrafjord, Fjærland, Urnes, Kaupanger en wandelingen met uitzicht over de Sognefjord.',photo:img('Sogndal Sognefjord Norway')},
{id:'skjak',name:'Skjåk / Bismo',dates:'19–23 juni',nights:'4 nachten',lat:61.883,lon:8.266,addr:'Skjåk Solside 799, 2690 Skjåk',map:'https://maps.google.com/?q=Skjak+Solside+799+2690+Skjak+Norway',about:'Rustige bergstreek tussen Jotunheimen, Reinheimen en de routes richting Geiranger. Goed voor autoroutes, rivieren, bergmeren en minder drukke wandelingen.',photo:img('Skjåk Norway mountains')},
{id:'nordaurdal',name:'Fagernes / Nord-Aurdal',dates:'23–27 juni',nights:'4 nachten',lat:60.985,lon:9.236,addr:'Førsøddin 30, 2920 Nord-Aurdal',map:'https://maps.google.com/?q=Forsoddin+30+2920+Nord-Aurdal+Norway',about:'Valdres-regio met meren, bergweides, staafkerken, toegankelijke wandelingen en dorpen zoals Fagernes en Beitostølen.',photo:img('Valdres Norway lake mountains')},
{id:'gjerstad',name:'Gjerstad',dates:'27–29 juni',nights:'2 nachten',lat:58.880,lon:9.018,addr:'Løyteveien 14, 4980 Gjerstad',map:'https://maps.google.com/?q=Loyteveien+14+4980+Gjerstad+Norway',about:'Rustige bosrijke regio in Zuid-Noorwegen met kustplaatsen zoals Risør, Tvedestrand en Kragerø binnen bereik.',photo:img('Risør Norway coast')},
{id:'kolding',name:'Kolding, Denemarken',dates:'29–30 juni',nights:'1 nacht',lat:55.490,lon:9.472,addr:'Kolding, Denemarken',map:'https://maps.google.com/?q=Kolding+Denmark',about:'Praktische tussenstop na de ferry Kristiansand–Hirtshals, daarna door naar Nijmegen.',photo:img('Kolding Denmark')}
];
const activities=[
{title:'Urnes staafkerk',place:'sogndal',cat:['cultuur','historie','uitzicht','regen'],time:'halve dag',dist:'ca. 1–1,5 uur incl. pont/route',lat:61.298,lon:7.323,map:'https://maps.google.com/?q=Urnes+Stave+Church',photo:img('Urnes Stave Church Norway'),text:'UNESCO-werelderfgoed boven de Lustrafjord. De houtsnijwerken laten de overgang zien van Vikingkunst naar christelijke symboliek. Let op de sierlijke dierfiguren, slangen en het oude noordportaal.',tip:'Mooie dagtocht: Sogndal → Solvorn → pont naar Urnes → kerk → lunch/koffie in Solvorn.'},
{title:'Molden wandeling',place:'sogndal',cat:['wandeling','uitzicht'],time:'4–6 uur',dist:'middel/zwaar',lat:61.345,lon:7.389,map:'https://maps.google.com/?q=Molden+Luster+Norway',photo:img('Molden Luster Norway hike fjord'),text:'Een van de mooiste uitzichtwandelingen bij de Sognefjord. Je kijkt diep de Lustrafjord in. Alleen doen bij redelijk weer en voldoende zicht.',tip:'Neem laagjes mee; boven kan het veel kouder en winderiger zijn.'},
{title:'Fjærland en gletsjermuseum',place:'sogndal',cat:['cultuur','natuur','regen'],time:'halve dag',dist:'ca. 45–60 min rijden',lat:61.405,lon:6.738,map:'https://maps.google.com/?q=Fjaerland+Norwegian+Glacier+Museum',photo:img('Fjaerland Norway glacier museum'),text:'Boekendorp aan het fjord met uitleg over gletsjers, klimaat en Jostedalsbreen. Goed bij wisselvallig weer.',tip:'Combineer met een korte wandeling of fotostop aan het water.'},
{title:'Nigardsbreen',place:'sogndal',cat:['wandeling','natuur','uitzicht'],time:'halve/hele dag',dist:'ca. 1,5 uur rijden',lat:61.676,lon:7.196,map:'https://maps.google.com/?q=Nigardsbreen',photo:img('Nigardsbreen glacier Norway'),text:'Gletsjerarm van de Jostedalsbreen. Indrukwekkend landschap, maar blijf op veilige afstand en volg lokale aanwijzingen.',tip:'Boek gids als je echt het ijs op wilt. Ga nooit zelfstandig op de gletsjer.'},
{title:'Kajakken Sognefjord',place:'sogndal',cat:['activiteit','water','uitzicht'],time:'2–4 uur',dist:'lokaal/omgeving',lat:61.229,lon:7.101,map:'https://maps.google.com/?q=kayak+Sogndal+Norway',photo:img('kayaking Sognefjord Norway'),text:'Mooie rustige manier om het fjord te beleven. Check wind, temperatuur en beschikbaarheid lokaal.',tip:'Bij wind of regen liever niet; kies dan Fjærland of een autoroute.'},
{title:'Gamle Strynefjellsvegen',place:'skjak',cat:['autoroute','uitzicht','natuur'],time:'halve dag',dist:'mooie route',lat:61.975,lon:7.254,map:'https://maps.google.com/?q=Gamle+Strynefjellsvegen',photo:img('Gamle Strynefjellsvegen Norway'),text:'Historische bergweg met sneeuwranden, ruig landschap en fotostops. Seizoensafhankelijk open.',tip:'Check wegstatus; bij slecht weer kan zicht beperkt zijn.'},
{title:'Geiranger dagtocht',place:'skjak',cat:['autoroute','cultuur','uitzicht','water'],time:'hele dag',dist:'lange maar mooie dag',lat:62.101,lon:7.206,map:'https://maps.google.com/?q=Geiranger+Norway',photo:img('Geiranger Norway fjord'),text:'Iconisch fjordgebied met uitzichtpunten, watervallen en fjordcultuur. Toeristisch, maar wel bijzonder.',tip:'Vroeg vertrekken om drukte te vermijden.'},
{title:'Raften of rivieractiviteit bij Skjåk',place:'skjak',cat:['activiteit','water'],time:'2–4 uur',dist:'omgeving Skjåk',lat:61.883,lon:8.266,map:'https://maps.google.com/?q=rafting+Skjak+Norway',photo:img('rafting Norway river'),text:'Skjåk staat bekend om rivieren en outdooractiviteiten. Mogelijk raften, canyoning of begeleide wateractiviteiten.',tip:'Alleen via lokale aanbieder; waterstanden bepalen wat kan.'},
{title:'Beitostølen wandeling',place:'nordaurdal',cat:['wandeling','uitzicht','natuur'],time:'2–5 uur',dist:'ca. 45–60 min rijden',lat:61.249,lon:8.906,map:'https://maps.google.com/?q=Beitostolen+hiking',photo:img('Beitostolen Norway hiking'),text:'Toegankelijke bergomgeving aan de rand van Jotunheimen. Veel keuze in korte en langere wandelingen.',tip:'Goede optie bij helder weer.'},
{title:'Valdres meren en kano',place:'nordaurdal',cat:['activiteit','water','rustig'],time:'2–4 uur',dist:'lokaal',lat:60.986,lon:9.236,map:'https://maps.google.com/?q=canoe+Valdres+Norway',photo:img('Valdres Norway canoe lake'),text:'Valdres heeft veel meren en rustige wateractiviteiten. Kano of SUP kan afhankelijk van verhuur en weer.',tip:'Wind is belangrijker dan temperatuur; check lokaal.'},
{title:'Risør kustplaats',place:'gjerstad',cat:['dorp','cultuur','water','eten'],time:'halve dag',dist:'ca. 40–50 min rijden',lat:58.720,lon:9.235,map:'https://maps.google.com/?q=Risor+Norway',photo:img('Risør Norway white wooden houses'),text:'Witte houten huizen, haven, kustsfeer en terrasjes. Mooie afwisseling na de bergen.',tip:'Combineer met korte kustwandeling of koffie aan de haven.'},
{title:'Kajakken bij Risør / zuidkust',place:'gjerstad',cat:['activiteit','water','uitzicht'],time:'2–4 uur',dist:'kustactiviteit',lat:58.720,lon:9.235,map:'https://maps.google.com/?q=kayak+Risor+Norway',photo:img('kayaking Norway archipelago'),text:'De zuidkust is geschikt voor kajakken tussen eilandjes, mits weer en wind goed zijn.',tip:'Ga begeleid als je de omgeving niet kent.'}
];
const route=[['17 juni','Sogndal','Aankomst/verblijf Sogndal'],['18 juni','Sogndal','Urnes staafkerk, Solvorn of fjorddag'],['19 juni','Sogndal → Skjåk/Bismo','Rijden naar Skjåk, onderweg rustig plannen'],['20–22 juni','Skjåk/Bismo','Wandelen, autoroutes, Geiranger of wateractiviteit'],['23 juni','Skjåk → Nord-Aurdal','Rijden naar Valdres / Fagernes'],['24–26 juni','Nord-Aurdal','Valdres, Beitostølen, meren en dorpen'],['27 juni','Nord-Aurdal → Gjerstad','Rijden naar Zuid-Noorwegen'],['28 juni','Gjerstad','Risør, kust, wandelen of kajak'],['29 juni','Gjerstad → Kristiansand → Hirtshals → Kolding','Ferry en overnachting Denemarken'],['30 juni','Kolding → Nijmegen','Terug naar huis']];
const pages=['Vandaag','Kaart','Activiteiten','Route','Verblijven','Vraag GPT','Notities'];let active='Vandaag',filter='alles';
const app=document.getElementById('app'),tabs=document.getElementById('tabs');
function todayPlace(){const d=new Date(),m=d.getMonth()+1,day=d.getDate(); if(m===6&&day>=19&&day<23)return places[1]; if(m===6&&day>=23&&day<27)return places[2]; if(m===6&&day>=27&&day<29)return places[3]; if(m===6&&day>=29&&day<30)return places[4]; return places[0];}
function gptPrompt(extra=''){const p=todayPlace(); const txt=`Ik ben op Noorwegen-reis. Vandaag verblijf ik rond ${p.name} (${p.dates}). We houden van wandelen, natuur, uitzicht, cultuur, historie, dorpen, koffie en goede restaurants. Fietsen hoeft niet. Geef praktisch advies met reistijden, kaarttips, weer-afweging en alternatieven bij regen. ${extra}`;return 'https://chatgpt.com/?q='+encodeURIComponent(txt)}
function btn(u,l,c='btn'){return `<a class="${c}" href="${u}" target="_blank" rel="noopener">${l}</a>`}
function setPage(p){active=p;render()}function tab(){tabs.innerHTML=pages.map(p=>`<button onclick="setPage('${p}')" class="${p===active?'active':''}">${p}</button>`).join('')}
function weatherBox(p){return `<div class="card wide"><h2>🌦 Live weer ${p.name}</h2><div id="weather" class="weather"><div class="wbox">Weer laden...</div></div><p class="small muted">Bron: Open-Meteo live API. Gebruik lokaal altijd je eigen waarneming en officiële waarschuwingen.</p></div>`}
async function loadWeather(p){try{const r=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${p.lat}&longitude=${p.lon}&current=temperature_2m,apparent_temperature,precipitation,wind_speed_10m,weather_code&daily=sunrise,sunset,precipitation_probability_max&timezone=auto`);const j=await r.json(),c=j.current,d=j.daily;document.getElementById('weather').innerHTML=`<div class="wbox"><div class="muted">Temperatuur</div><div class="wbig">${Math.round(c.temperature_2m)}°C</div></div><div class="wbox"><div class="muted">Gevoel</div><div class="wbig">${Math.round(c.apparent_temperature)}°C</div></div><div class="wbox"><div class="muted">Wind</div><div class="wbig">${Math.round(c.wind_speed_10m)} km/u</div></div><div class="wbox"><div class="muted">Regenkans</div><div class="wbig">${d.precipitation_probability_max?.[0]??'?'}%</div></div><div class="wbox"><div class="muted">Zonsopkomst</div><b>${(d.sunrise?.[0]||'').slice(11,16)}</b></div><div class="wbox"><div class="muted">Zonsondergang</div><b>${(d.sunset?.[0]||'').slice(11,16)}</b></div><div class="wbox"><div class="muted">Advies</div><b>${(d.precipitation_probability_max?.[0]||0)>55?'Regenplan klaarzetten':'Wandelen kan goed'}</b></div><div class="wbox"><div class="muted">Update</div><b>${(c.time||'').replace('T',' ')}</b></div>`}catch(e){document.getElementById('weather').innerHTML='<div class="wbox">Weer kon niet geladen worden.</div>'}}
function activityCard(a){return `<article class="card act" data-cat="${a.cat.join(' ')}" data-place="${a.place}"><div class="photo" style="background-image:url('${a.photo}')"></div><div class="row">${a.cat.slice(0,4).map(c=>`<span class="tag ${c==='wandeling'||c==='natuur'?'ok':c==='cultuur'||c==='historie'?'warn':''}">${c}</span>`).join('')}<span class="tag">${a.time}</span></div><h3>${a.title}</h3><p>${a.text}</p><p class="muted small"><b>Praktisch:</b> ${a.dist}. ${a.tip}</p><div class="row">${btn(a.map,'📍 Google Maps','btn blue')}${btn(gptPrompt('Vertel extra achtergrond en praktische tips over '+a.title),'💬 Vraag GPT','btn dark')}</div></article>`}
function filterButtons(){const fs=['alles','wandeling','cultuur','historie','uitzicht','activiteit','water','regen','autoroute','eten'];return `<div class="filter">${fs.map(f=>`<button onclick="filter='${f}';render()" class="${filter===f?'active':''}">${f}</button>`).join('')}</div>`}
function renderToday(){const p=todayPlace();document.getElementById('currentPill').textContent='📍 Vandaag: '+p.name;const acts=activities.filter(a=>a.place===p.id).slice(0,5);app.innerHTML=`<section class="grid"><div class="card wide"><div class="photo" style="height:240px;background-image:url('${p.photo}')"></div><div class="row"><span class="tag ok">${p.dates}</span><span class="tag">${p.nights}</span></div><h2>Vandaag rond ${p.name}</h2><p>${p.about}</p><div class="row">${btn(p.map,'📍 Verblijf in Google Maps','btn blue')}${btn(gptPrompt('Maak een plan voor vandaag rond '+p.name),'💬 Plan mijn dag','btn dark')}</div></div>${weatherBox(p)}<div class="card wide"><h2>Aanbevolen vanuit deze plek</h2><div class="grid">${acts.map(activityCard).join('')}</div></div></section>`;loadWeather(p)}
function renderMap(){app.innerHTML=`<section class="card"><h2>🗺 Kaart: verblijven en activiteiten</h2><div id="map" class="map"></div><p class="muted small">Blauw = verblijf, groen/oranje = activiteiten. Tik op een marker voor Google Maps en uitleg.</p></section>`;setTimeout(()=>{const m=L.map('map').setView([60.7,8.1],6);L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap'}).addTo(m);places.forEach(p=>L.marker([p.lat,p.lon]).addTo(m).bindPopup(`<b>🏠 ${p.name}</b><br>${p.dates}<br><a target=_blank href='${p.map}'>Google Maps</a>`));activities.forEach(a=>L.circleMarker([a.lat,a.lon],{radius:8}).addTo(m).bindPopup(`<b>${a.title}</b><br>${a.cat.join(', ')}<br><a target=_blank href='${a.map}'>Google Maps</a>`))},50)}
function renderActivities(){let list=filter==='alles'?activities:activities.filter(a=>a.cat.includes(filter));app.innerHTML=`<section><div class="card wide"><h2>Activiteiten, wandelingen en cultuur</h2><p class="muted">Filter op wat je vandaag wilt doen. Fietsen is bewust weggelaten.</p>${filterButtons()}</div><div class="grid">${list.map(activityCard).join('')}</div></section>`}
function renderRoute(){app.innerHTML=`<section class="card"><h2>Route die ik aanhoud</h2>${route.map(r=>`<div class="item"><div class="row"><span class="tag">${r[0]}</span><span class="tag ok">${r[1]}</span></div><h3>${r[2]}</h3></div>`).join('')}</section>`}
function renderStays(){app.innerHTML=`<section class="grid">${places.map(p=>`<div class="card half"><div class="photo" style="background-image:url('${p.photo}')"></div><div class="row"><span class="tag ok">${p.dates}</span><span class="tag">${p.nights}</span></div><h3>${p.name}</h3><p class="muted">${p.addr}</p><p>${p.about}</p><div class="row">${btn(p.map,'📍 Google Maps','btn blue')}${btn(gptPrompt('Geef tips rond mijn verblijf '+p.name),'💬 Vraag GPT','btn dark')}</div></div>`).join('')}</section>`}
function renderGPT(){const p=todayPlace();app.innerHTML=`<section class="grid"><div class="card wide"><h2>💬 Vraag ChatGPT met reiscontext</h2><p>Deze knoppen openen ChatGPT met jouw route, huidige verblijfplaats en voorkeuren alvast ingevuld.</p><div class="row">${btn(gptPrompt('Maak een realistisch dagplan voor vandaag.'),'Plan mijn dag','btn dark')}${btn(gptPrompt('Wat kunnen we doen bij regen?'),'Regenplan','btn dark')}${btn(gptPrompt('Geef historische en culturele achtergrond bij de plek waar ik heen ga.'),'Achtergrond bij bezoek','btn dark')}${btn(gptPrompt('Zoek een goed restaurant of koffiestop in de buurt.'),'Eten/koffie','btn dark')}</div></div><div class="card wide"><h2>Eigen vraag</h2><textarea id="q" placeholder="Bijv. We gaan 18 juni naar Urnes staafkerk. Geef historische achtergrond, praktische tips, parkeeradvies en iets leuks onderweg."></textarea><br><br><button class="btn blue" onclick="openGPT()">Open vraag in ChatGPT</button></div><div class="card wide"><h2>Voorbeeld Urnes</h2><p><b>Urnes staafkerk</b> is belangrijk omdat hier oude Vikingachtige ornamentiek en christelijke kerkbouw samenkomen. De dierfiguren en slangen op het portaal zijn niet alleen versiering: ze laten een cultuur zien die net christelijk werd, maar de oudere beeldtaal nog meenam.</p></div></section>`}
function openGPT(){const q=document.getElementById('q').value||'Geef advies voor vandaag tijdens mijn Noorwegen-reis.';location.href=gptPrompt(q)}
function renderNotes(){app.innerHTML=`<section class="card"><h2>Notities</h2><textarea id="notes" placeholder="Eigen notities...">${localStorage.noorwegenNotes||''}</textarea><br><br><button class="btn blue" onclick="localStorage.noorwegenNotes=document.getElementById('notes').value;alert('Opgeslagen')">Opslaan</button></section>`}
function render(){tab(); if(active==='Vandaag')renderToday(); if(active==='Kaart')renderMap(); if(active==='Activiteiten')renderActivities(); if(active==='Route')renderRoute(); if(active==='Verblijven')renderStays(); if(active==='Vraag GPT')renderGPT(); if(active==='Notities')renderNotes()}render();
</script>
</body>
</html>
