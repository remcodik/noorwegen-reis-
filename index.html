function r(name,desc,q){return {name,desc,maps:mapsSearch(q),menu:menuSearch(q)}}
function act(id,stayId,name,type,prio,status,date,order,drive,time,km,level,desc,q,kq){return {id,stayId,name,type,prio,status,date,order,drive,time,km,level,desc,maps:mapsSearch(q),komoot:`https://www.komoot.com/search/${enc(kq||q)}`}}

let state=load();let tab="today";let activeStay="skjak";let showPlan=true;let statusFilters={plan:true,todo:true,done:true,skip:false};let map=null;
function load(){try{return JSON.parse(localStorage.getItem(STORE)||"{}")}catch(e){return {}}}
function save(){localStorage.setItem(STORE,JSON.stringify(state))}
function st(id){return trip.stays.find(s=>s.id===id)}
function key(a){return a.stayId+"__"+a.id}
function getStatus(a){return state.status?.[key(a)]||a.status||"todo"}
function setStatus(k,v){state.status=state.status||{};state.status[k]=v;save();render()}
function getDate(a){return state.dates?.[key(a)]??a.date??""}
function setDate(k,v){state.dates=state.dates||{};state.dates[k]=v;save();render()}
function getOrder(a){let o=state.order?.[key(a)];return o!==undefined?Number(o):(a.order||99)}
function setOrder(k,v){state.order=state.order||{};state.order[k]=v;save()}
function notes(k){return state.notes?.[k]||""}
function allActs(){let custom=(state.custom||[]);return [...trip.activities,...custom].map(a=>({...a,stay:st(a.stayId)})).filter(a=>a.stay)}
function visibleByStatus(a){let s=getStatus(a);return !!statusFilters[s]}
function e(s){return String(s??"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]))}
function dateLbl(v){if(!v)return "geen datum";let d=new Date(v+"T12:00");return d.toLocaleDateString("nl-NL",{weekday:"short",day:"numeric",month:"short"})}
function stayRoute(a){return mapsRoute(a.stay.address,a.name+" Norway")}
function hereRoute(a){return `https://www.google.com/maps/dir/?api=1&destination=${enc(a.name+' Norway')}`}
function dayDates(){return [...new Set(allActs().map(getDate).filter(Boolean))].sort()}
function dayNo(d){let i=dayDates().indexOf(d);return i>=0?i+1:""}
function groupedPlanning(){let m={};allActs().filter(a=>getDate(a)).filter(a=>activeStay==='all'||a.stayId===activeStay).filter(visibleByStatus).forEach(a=>{let d=getDate(a);(m[d]=m[d]||[]).push(a)});Object.values(m).forEach(list=>list.sort((a,b)=>getOrder(a)-getOrder(b)||a.name.localeCompare(b.name)));return m}
function render(){let app=document.getElementById('app');app.innerHTML=`<section class="hero"><h1>${trip.title}</h1><div class="version">Remco Travel · laatste update ${LAST_UPDATE}</div></section><nav class="tabs">${tb('today','Vandaag')}${tb('planning','Planning')}${tb('map','Kaart')}${tb('stays','Verblijven')}${tb('add','Toevoegen')}${tb('more','Meer')}</nav>${tab==='today'?todayView():tab==='planning'?planningView():tab==='map'?mapView():tab==='stays'?staysView():tab==='add'?addView():moreView()}<div class="footer">Gegevens blijven lokaal op je iPhone bewaard. Maak backup vóór uploaden.</div>`; if(tab==='map')setTimeout(initMap,250)}
function tb(id,l){return `<button class="${tab===id?'active':''}" onclick="tab='${id}';render()">${l}</button>`}
function stayFilter(){return `<div class="filtersRow"><select onchange="activeStay=this.value;render()"><option value="all" ${activeStay==='all'?'selected':''}>Alle accommodaties</option>${trip.stays.map(s=>`<option value="${s.id}" ${activeStay===s.id?'selected':''}>${s.label}</option>`).join('')}</select></div>`}
function statusRow(){let labels={todo:'Gepland',plan:'Vast gepland',done:'Gedaan',skip:'Overgeslagen'};return `<div class="filtersRow">${Object.keys(labels).map(k=>`<label class="check ${statusFilters[k]?'on':''}"><input type="checkbox" ${statusFilters[k]?'checked':''} onchange="statusFilters.${k}=this.checked;render()">${labels[k]}</label>`).join('')}</div>`}
function todayView(){let a=allActs().filter(x=>x.stayId===activeStay).filter(visibleByStatus).filter(x=>getStatus(x)!=='skip');let today=todayISO();let now=a.filter(x=>getDate(x)===today || getStatus(x)==='plan').sort((x,y)=>getOrder(x)-getOrder(y));let tomorrowDate=new Date();tomorrowDate.setDate(tomorrowDate.getDate()+1);let tom=tomorrowDate.toISOString().slice(0,10);let morgen=a.filter(x=>getDate(x)===tom).sort((x,y)=>getOrder(x)-getOrder(y));let later=a.filter(x=>getDate(x)&&getDate(x)!==today&&getDate(x)!==tom).sort((x,y)=>getDate(x).localeCompare(getDate(y))||getOrder(x)-getOrder(y));return `<section class="card"><h2>Vandaag</h2>${stayFilter()}${statusRow()}<p class="muted">Rustig overzicht: alleen gekozen accommodatie en relevante status.</p>${sec('Vandaag / vast gepland',now)}${sec('Morgen',morgen)}${sec('Later gepland',later.slice(0,8))}</section>`}
function sec(title,list){return `<div class="section">${title}</div>${list.length?list.map(activityCard).join(''):`<p class="muted">Niets gevonden.</p>`}`}
function activityCard(a){let k=key(a),s=getStatus(a);return `<details class="activity"><summary><div class="titleRow"><span>${typeIcon[a.type]||'📍'}</span><div style="flex:1"><b>${e(a.name)}</b><div class="meta">${e(a.stay.label)} · ${e(a.drive||'')} ${a.time?'· '+e(a.time):''}</div></div></div></summary><div class="activityBody"><div class="chips"><span class="tag">${e(a.type)}</span>${a.km?`<span class="tag">${e(a.km)}</span>`:''}${a.level?`<span class="tag">${e(a.level)}</span>`:''}</div><p>${e(a.desc)}</p><div class="links"><a class="btn small" target="_blank" href="${a.maps}">Maps</a><a class="btn small" target="_blank" href="${a.komoot}">Komoot</a><a class="btn small" target="_blank" href="${stayRoute(a)}">Route verblijf</a><a class="btn small" target="_blank" href="${hereRoute(a)}">Route vanaf hier</a></div><div class="status"><button onclick="setStatus('${k}','todo')" class="${s==='todo'?'active':''}">gepland</button><button onclick="setStatus('${k}','plan')" class="${s==='plan'?'active':''}">vast</button><button onclick="setStatus('${k}','done')" class="${s==='done'?'active':''}">gedaan</button><button onclick="setStatus('${k}','skip')" class="${s==='skip'?'active':''}">overslaan</button></div><details><summary>📅 Plan / datum</summary><div class="links"><input type="date" value="${getDate(a)}" onchange="setDate('${k}',this.value)"><button onclick="setDate('${k}','')">wis datum</button><input type="number" min="1" style="width:90px" value="${getOrder(a)}" onchange="setOrder('${k}',this.value);render()" placeholder="volgorde"></div></details><details><summary>✨ GPT-info plakken</summary><textarea id="g_${k}" placeholder="Plak compacte GPT-info...">${e(notes(k))}</textarea><button onclick="state.notes=state.notes||{};state.notes['${k}']=document.getElementById('g_${k}').value;save();alert('Opgeslagen')">opslaan</button></details></div></details>`}
function planningView(){let m=groupedPlanning(),dates=Object.keys(m).sort();return `<section class="card"><h2>Planning</h2>${stayFilter()}${statusRow()}<p class="muted">Datum staat één keer per dag. Gebruik volgorde of sleepknoppen om binnen dezelfde dag te ordenen.</p>${dates.length?dates.map(d=>dayBlock(d,m[d])).join(''):'<p class="muted">Nog geen geplande activiteiten.</p>'}</section>`}
function dayBlock(d,list){let dn=dayNo(d);return `<div class="day"><h2><span class="badge">${dn}</span> ${dateLbl(d)}</h2>${list.map((a,i)=>`<div class="planItem" draggable="true" ondragstart="dragStart(event,'${key(a)}')" ondrop="dropOn(event,'${key(a)}','${d}')" ondragover="event.preventDefault()"><div class="badge ${a.stay.color}">${dn}-${i+1}</div><div style="flex:1"><b>${typeIcon[a.type]||'📍'} ${e(a.name)}</b><div class="meta">${e(a.stay.label)} · ${e(a.drive||'')}</div><div class="controls"><button onclick="move('${key(a)}','${d}',-1)">↑</button><button onclick="move('${key(a)}','${d}',1)">↓</button><button onclick="setStatus('${key(a)}','done')">gedaan</button><button onclick="setStatus('${key(a)}','skip')">overslaan</button></div></div><span class="drag">☰</span></div>`).join('')}</div>`}
let dragged=null;function dragStart(ev,k){dragged=k}function dropOn(ev,k,d){ev.preventDefault();if(!dragged||dragged===k)return;let list=groupedPlanning()[d]||[];let keys=list.map(key),from=keys.indexOf(dragged),to=keys.indexOf(k);if(from<0||to<0)return;keys.splice(to,0,keys.splice(from,1)[0]);keys.forEach((kk,i)=>setOrder(kk,i+1));save();render()}function move(k,d,delta){let list=groupedPlanning()[d]||[];let keys=list.map(key),i=keys.indexOf(k),j=i+delta;if(i<0||j<0||j>=keys.length)return;[keys[i],keys[j]]=[keys[j],keys[i]];keys.forEach((kk,n)=>setOrder(kk,n+1));save();render()}
function mapView(){return `<section class="card"><h2>Kaart</h2>${stayFilter()}${statusRow()}<p class="muted">Kleur = accommodatie. Label = dag-volgorde.</p><div id="map"></div></section>`}
function initMap(){if(!window.L)return; if(map)map.remove();map=L.map('map',{scrollWheelZoom:false});L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:18,attribution:'© OpenStreetMap'}).addTo(map);let pts=[];trip.stays.filter(s=>activeStay==='all'||s.id===activeStay).forEach(s=>{addPin(s.lat,s.lon,s.color,'🏠',`<b>${s.label}</b><br>${s.address}<br><a href="${mapsSearch(s.address)}" target="_blank">Maps</a>`);pts.push([s.lat,s.lon])});Object.entries(groupedPlanning()).forEach(([d,list])=>list.forEach((a,i)=>{if(!a.stay.lat||!a.stay.lon)return;let lat=a.lat||a.stay.lat+(i+1)*0.012,lon=a.lon||a.stay.lon+(i+1)*0.012;let label=`${dayNo(d)}-${i+1}`;addPin(lat,lon,a.stay.color,label,`<b>${dateLbl(d)} · ${a.name}</b><br>${a.stay.label}<br>${a.drive||''}<br><a href="${a.maps}" target="_blank">Maps</a>`);pts.push([lat,lon])}));if(pts.length)map.fitBounds(pts,{padding:[25,25]})}
function addPin(lat,lon,cls,label,pop){let icon=L.divIcon({className:'',html:`<div class="pin ${cls}">${label}</div>`,iconSize:[34,34],iconAnchor:[17,17]});L.marker([lat,lon],{icon}).addTo(map).bindPopup(pop)}
function staysView(){return `<section class="card"><h2>Verblijven</h2>${trip.stays.map(s=>`<div class="card stayCard"><h2>${e(s.label)}</h2><p><b>${e(s.base)}</b><br>${e(s.address)}</p><div class="links"><a class="btn" target="_blank" href="${mapsSearch(s.address)}">Maps</a><a class="btn" target="_blank" href="${mapsSearch('supermarket near '+s.address)}">🛒 supermarkt</a><a class="btn" target="_blank" href="${mapsSearch('cafe near '+s.address)}">☕ koffie</a><a class="btn" target="_blank" href="${mapsSearch('restaurant near '+s.address)}">🍽 restaurants</a><a class="btn" target="_blank" href="${mapsSearch('EV charging near '+s.address)}">🔌 laden</a></div><div class="info"><b>Weetjes / omgeving</b><ul>${s.facts.map(f=>`<li>${e(f)}</li>`).join('')}</ul></div><details ${showPlan?'open':''}><summary>Aanbevolen plan / tips</summary><ul>${s.tips.map(t=>`<li>${e(t)}</li>`).join('')}</ul></details><div class="section">Koffie & avondeten</div><div class="grid">${s.food.map(f=>`<div class="box"><b>${e(f.name)}</b><p>${e(f.desc)}</p><div class="links"><a class="btn small" target="_blank" href="${f.maps}">Maps</a><a class="btn small" target="_blank" href="${f.menu}">Menu/site</a></div></div>`).join('')}</div></div>`).join('')}</section>`}
function addView(){return `<section class="card"><h2>Toevoegen</h2><p class="muted">Voeg snel naam/link toe. Daarna kun je GPT-info in één blok plakken bij de activiteit.</p><div class="grid"><label>Accommodatie<br><select id="as">${trip.stays.map(s=>`<option value="${s.id}">${s.label}</option>`).join('')}</select></label><label>Naam of link<br><input id="an" placeholder="Tronoberget of Komoot-link"></label><label>Datum<br><input id="ad" type="date"></label><label>Type<br><select id="at">${Object.keys(typeIcon).map(t=>`<option value="${t}">${typeIcon[t]} ${t}</option>`).join('')}</select></label></div><button class="primary" onclick="addAct()">Toevoegen</button></section>`}
function addAct(){let name=document.getElementById('an').value.trim();if(!name)return alert('Naam invullen');let stayId=document.getElementById('as').value;let id='custom_'+Date.now();let a={id,stayId,name,type:document.getElementById('at').value,prio:'leuk',status:'todo',date:document.getElementById('ad').value,order:99,drive:'aanvullen',time:'',km:'',level:'',desc:'Eigen toevoeging. Verrijk met GPT-info.',maps:mapsSearch(name+' Norway'),komoot:'https://www.komoot.com/search/'+enc(name)};state.custom=state.custom||[];state.custom.push(a);save();tab='planning';render()}
function moreView(){return `<section class="card"><h2>Meer</h2><div class="info"><b>Reisregels / achtergrond</b><ul><li>Op verblijfsdagen liever niet de hele dag autorijden.</li><li>Lange ritten horen vooral op verplaatsingsdagen.</li><li>Rustige dagen: één hoofdactiviteit + koffie/lunch + kleine stop.</li></ul></div><div class="section">Verplaatsingsdagen</div>${trip.routes.map(x=>`<div class="box"><b>${e(x.title)}</b><p>${e(x.desc)}</p><a class="btn small" target="_blank" href="${mapsRouteWay(x.from,x.to,x.stops)}">Google route</a></div>`).join('')}<div class="section">Backup</div><button onclick="downloadBackup()">Backup downloaden</button><button onclick="copyBackup()">Backup kopiëren</button><details><summary>Wijzigingslog</summary><p>${LAST_UPDATE}: rustige 2.0 indeling, planning met slepen, exacte adressen, menu-links, ferry/Kolding, minder startinformatie.</p></details></section>`}
function downloadBackup(){let b=new Blob([JSON.stringify(state,null,2)],{type:'application/json'}),u=URL.createObjectURL(b),a=document.createElement('a');a.href=u;a.download='reisplanner-backup.json';a.click();URL.revokeObjectURL(u)}function copyBackup(){navigator.clipboard.writeText(JSON.stringify(state,null,2));alert('Backup gekopieerd')}
render();
</script></main></body></html>
