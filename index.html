<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Noorwegen Reisplanner v2.0</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
:root{--bg:#eef5f7;--card:#fff;--ink:#102033;--muted:#667085;--line:#d9e2ea;--blue:#2563eb;--green:#0f766e;--orange:#b45309;--shadow:0 12px 30px rgba(16,24,40,.10);--r:22px}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;line-height:1.45}a{text-decoration:none;color:inherit}
header{background:linear-gradient(135deg,#071626,#123a78 55%,#0f766e);color:#fff;padding:22px 15px 14px;position:sticky;top:0;z-index:30;box-shadow:var(--shadow)}
.wrap{max-width:1180px;margin:auto}.head{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}.head h1{margin:0;font-size:clamp(26px,6vw,48px);letter-spacing:-.05em}.sub{margin:7px 0 0;color:#dbeafe}.version{display:inline-flex;gap:7px;align-items:center;border:1px solid rgba(255,255,255,.25);background:rgba(255,255,255,.13);border-radius:999px;padding:8px 12px;font-weight:800;white-space:nowrap}
.tabs{display:flex;gap:8px;overflow:auto;margin-top:14px}.tabs button,.chips button{border:1px solid rgba(255,255,255,.28);background:rgba(255,255,255,.13);color:white;border-radius:999px;padding:9px 13px;font-weight:800;white-space:nowrap}.tabs button.active{background:white;color:#123a78}
main{padding:15px}.grid{display:grid;grid-template-columns:repeat(12,1fr);gap:14px}.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);padding:16px}.wide{grid-column:span 12}.half{grid-column:span 6}.third{grid-column:span 4}@media(max-width:820px){.half,.third{grid-column:span 12}.head{display:block}.version{margin-top:10px}header{position:relative}}
h2{margin:0 0 12px;font-size:24px;letter-spacing:-.02em}h3{margin:0 0 6px;font-size:19px}.muted{color:var(--muted)}.small{font-size:13px}.row{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.btn{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);background:#fff;border-radius:13px;padding:9px 11px;font-weight:800;color:#172033}.btn.blue{background:var(--blue);color:#fff;border-color:var(--blue)}.btn.green{background:var(--green);color:#fff;border-color:var(--green)}.btn.dark{background:#111827;color:#fff;border-color:#111827}
.tag{display:inline-flex;gap:4px;align-items:center;background:#eef4ff;color:#1d4ed8;border:1px solid #c7d7fe;border-radius:999px;padding:4px 9px;font-size:12px;font-weight:800}.tag.ok{background:#ecfdf3;color:#067647;border-color:#bbf7d0}.tag.warn{background:#fffbeb;color:#92400e;border-color:#fde68a}
.daystrip{display:flex;gap:8px;overflow:auto;padding:3px 0 12px}.daystrip button{min-width:92px;border:1px solid var(--line);background:white;border-radius:16px;padding:9px 10px;font-weight:900;text-align:left}.daystrip button.active{background:#111827;color:white}.daystrip small{display:block;font-weight:700;opacity:.72}
.photo{height:180px;border-radius:18px;background:#dbeafe center/cover no-repeat;margin:-2px -2px 13px}.photo.big{height:250px}.item{border-top:1px solid var(--line);padding-top:13px;margin-top:13px}.item:first-child{border-top:0;margin-top:0;padding-top:0}
.map{height:520px;border-radius:20px;overflow:hidden;border:1px solid var(--line)}@media(max-width:700px){.map{height:440px}.photo.big{height:210px}}
.chips{display:flex;gap:8px;overflow:auto;margin-bottom:12px}.chips button{color:#172033;background:white;border-color:var(--line)}.chips button.active{background:#111827;color:#fff}
.weatherline{display:flex;gap:10px;align-items:center;background:#f8fafc;border:1px solid var(--line);border-radius:16px;padding:11px 12px;font-weight:900}.weatherline span{color:var(--muted);font-weight:700}.note{border-left:5px solid var(--green);background:#f0fdfa;border-radius:14px;padding:12px}details{border:1px solid var(--line);border-radius:14px;padding:10px 12px;background:#fbfdff}summary{font-weight:900;cursor:pointer}textarea,input{width:100%;border:1px solid var(--line);border-radius:14px;padding:12px;font:inherit}.hidden{display:none!important}.footer{text-align:center;color:var(--muted);font-size:13px;padding:24px}.refresh{cursor:pointer}
</style>
</head>
<body>
<header><div class="wrap"><div class="head"><div><h1>🇳🇴 Noorwegen Reisplanner</h1><p class="sub">Dag-voor-dag dashboard met kaart, wandelingen, activiteiten, Google Maps en GPT-vragen.</p></div><div class="version">✅ Versie 2.0 · 17 juni 2026</div></div><nav class="tabs" id="tabs"></nav></div></header>
<main class="wrap" id="app"></main><footer class="footer">Zet op iPhone beginscherm via Delen → Zet op beginscherm. Zie je geen versie 2.0? Ververs de pagina.</footer>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const IMG=q=>`https://source.unsplash.com/1100x750/?${encodeURIComponent(q)}`;
const places={
sogndal:{name:'Sogndal',addr:'Sogndalsfjøra, Noorwegen',lat:61.2296,lon:7.1018,map:'https://maps.google.com/?q=Sogndalsfjora,Norway',photo:IMG('Sogndal Sognefjord Norway'),about:'Fjordstadje aan de Sognefjord. Goede basis voor Urnes, Solvorn, Fjærland, Nigardsbreen, Kaupanger en Molden.'},
skjak:{name:'Skjåk / Bismo',addr:'Skjåk Solside 799, 2690 Skjåk',lat:61.883,lon:8.266,map:'https://maps.google.com/?q=Skjak+Solside+799+2690+Skjak+Norway',photo:IMG('Skjåk Norway mountains'),about:'Rustige bergstreek tussen Jotunheimen en Reinheimen. Goed voor autoroutes, rivieren, bergmeren en Geiranger-dagtocht.'},
nord:{name:'Fagernes / Nord-Aurdal',addr:'Førsøddin 30, 2920 Nord-Aurdal',lat:60.985,lon:9.236,map:'https://maps.google.com/?q=Forsoddin+30+2920+Nord-Aurdal+Norway',photo:IMG('Valdres Norway lake mountains'),about:'Valdres-regio met meren, staafkerken, dorpen, bergweides en toegankelijke wandelingen.'},
gjerstad:{name:'Gjerstad',addr:'Løyteveien 14, 4980 Gjerstad',lat:58.880,lon:9.018,map:'https://maps.google.com/?q=Loyteveien+14+4980+Gjerstad+Norway',photo:IMG('Risør Norway coast'),about:'Rustige bosrijke regio in Zuid-Noorwegen, met kustplaatsen Risør, Tvedestrand en Kragerø binnen bereik.'},
kolding:{name:'Kolding',addr:'Kolding, Denemarken',lat:55.490,lon:9.472,map:'https://maps.google.com/?q=Kolding+Denmark',photo:IMG('Kolding Denmark'),about:'Praktische tussenstop na de ferry Kristiansand–Hirtshals.'}
};
const days=[
{d:'17 jun',p:'sogndal',title:'Sogndal rustig landen',plan:'Verblijf Sogndal. Korte wandeling langs fjord, boodschappen en oriënteren.'},
{d:'18 jun',p:'sogndal',title:'Urnes / Solvorn dag',plan:'Aanrader: Solvorn + pont naar Urnes staafkerk. Alternatief bij regen: Fjærland en gletsjermuseum.'},
{d:'19 jun',p:'skjak',title:'Sogndal → Skjåk/Bismo',plan:'Rij naar Skjåk. Plan niet te vol; onderweg fotostops en lunch.'},
{d:'20 jun',p:'skjak',title:'Skjåk bergdag',plan:'Korte/middellange wandeling of rustige verkenning rond Bismo en Skjåk.'},
{d:'21 jun',p:'skjak',title:'Gamle Strynefjellsvegen',plan:'Mooie autoroute als de weg open is en het zicht goed is.'},
{d:'22 jun',p:'skjak',title:'Geiranger of wateractiviteit',plan:'Geiranger-dagtocht bij mooi weer, of raften/kano afhankelijk van aanbod.'},
{d:'23 jun',p:'nord',title:'Skjåk → Nord-Aurdal',plan:'Rijden naar Valdres / Fagernes. Rustige avond aan het meer.'},
{d:'24 jun',p:'nord',title:'Valdres meren',plan:'Meren, korte wandeling, koffiestop in Fagernes of omgeving.'},
{d:'25 jun',p:'nord',title:'Beitostølen / bergwandeling',plan:'Beitostølen als bergdag met wandeling en uitzicht.'},
{d:'26 jun',p:'nord',title:'Rustige Valdres-dag',plan:'Kies afhankelijk van weer: wandeling, dorp, staafkerk of kano.'},
{d:'27 jun',p:'gjerstad',title:'Nord-Aurdal → Gjerstad',plan:'Rijden naar Zuid-Noorwegen. Niet te veel extra plannen.'},
{d:'28 jun',p:'gjerstad',title:'Risør en zuidkust',plan:'Risør, kustwandeling, terras, eventueel kajak bij goed weer.'},
{d:'29 jun',p:'kolding',title:'Gjerstad → Kristiansand → Kolding',plan:'Ferry Kristiansand–Hirtshals en door naar Kolding.'},
{d:'30 jun',p:'kolding',title:'Kolding → Nijmegen',plan:'Terugreis naar Nijmegen.'}
];
const activities=[
{t:'Urnes staafkerk',p:'sogndal',cat:['cultuur','historie','uitzicht','regen'],lat:61.298,lon:7.323,time:'halve dag',map:'https://maps.google.com/?q=Urnes+Stave+Church',photo:IMG('Urnes Stave Church Norway'),txt:'UNESCO-werelderfgoed boven de Lustrafjord. De houtsnijwerken tonen de overgang van Vikingkunst naar christelijke symboliek.',bg:'Gebouwd rond 1130 en de oudste nog bestaande staafkerk van Noorwegen. Let op de slangen, dierfiguren en het noordportaal: dit is de beroemde Urnes-stijl. De kerk laat zien hoe oude Noorse beeldtaal bleef bestaan terwijl Noorwegen christelijk werd.'},
{t:'Solvorn',p:'sogndal',cat:['dorp','koffie','water'],lat:61.300,lon:7.241,time:'1–2 uur',map:'https://maps.google.com/?q=Solvorn+Norway',photo:IMG('Solvorn Norway fjord'),txt:'Klein fjorddorp met veer naar Urnes, houten huizen en rustige sfeer.',bg:'Mooi als startpunt voor Urnes. Neem tijd voor koffie of lunch aan het water.'},
{t:'Molden wandeling',p:'sogndal',cat:['wandeling','uitzicht'],lat:61.345,lon:7.389,time:'4–6 uur',map:'https://maps.google.com/?q=Molden+Luster+Norway',photo:IMG('Molden Luster Norway hike fjord'),txt:'Topwandeling met uitzicht over de Lustrafjord. Alleen doen bij redelijk zicht.',bg:'Niet onderschatten: neem laagjes, water en check weer. Bij laaghangende bewolking is Urnes/Fjærland verstandiger.'},
{t:'Fjærland en gletsjermuseum',p:'sogndal',cat:['cultuur','natuur','regen'],lat:61.405,lon:6.738,time:'halve dag',map:'https://maps.google.com/?q=Fjaerland+Norwegian+Glacier+Museum',photo:IMG('Fjaerland Norway glacier museum'),txt:'Boekendorp en museum over gletsjers, klimaat en Jostedalsbreen.',bg:'Sterk regenalternatief. Combineer met fotostops aan het fjord.'},
{t:'Nigardsbreen',p:'sogndal',cat:['wandeling','natuur','uitzicht'],lat:61.676,lon:7.196,time:'halve/hele dag',map:'https://maps.google.com/?q=Nigardsbreen',photo:IMG('Nigardsbreen glacier Norway'),txt:'Indrukwekkende gletsjerarm van de Jostedalsbreen.',bg:'Blijf op afstand en volg lokale waarschuwingen. Alleen met gids het ijs op.'},
{t:'Kajakken Sognefjord',p:'sogndal',cat:['activiteit','water'],lat:61.229,lon:7.101,time:'2–4 uur',map:'https://maps.google.com/?q=kayak+Sogndal+Norway',photo:IMG('kayaking Sognefjord Norway'),txt:'Rustige fjordactiviteit bij goed weer.',bg:'Wind is bepalend. Bij twijfel lokaal boeken of overslaan.'},
{t:'Gamle Strynefjellsvegen',p:'skjak',cat:['autoroute','uitzicht','natuur'],lat:61.975,lon:7.254,time:'halve dag',map:'https://maps.google.com/?q=Gamle+Strynefjellsvegen',photo:IMG('Gamle Strynefjellsvegen Norway'),txt:'Historische bergweg met ruig landschap en fotostops.',bg:'Check opening en wegcondities. Bij mist is de waarde beperkt.'},
{t:'Geiranger',p:'skjak',cat:['autoroute','water','uitzicht'],lat:62.101,lon:7.206,time:'hele dag',map:'https://maps.google.com/?q=Geiranger+Norway',photo:IMG('Geiranger Norway fjord'),txt:'Iconisch fjordgebied met uitzichtpunten en watervallen.',bg:'Toeristisch maar bijzonder. Vroeg vertrekken helpt.'},
{t:'Raften / rivieractiviteit Skjåk',p:'skjak',cat:['activiteit','water'],lat:61.883,lon:8.266,time:'2–4 uur',map:'https://maps.google.com/?q=rafting+Skjak+Norway',photo:IMG('rafting Norway river'),txt:'Outdooractiviteit rond rivieren bij Skjåk.',bg:'Alleen met lokale aanbieder; waterstand en weer bepalen wat kan.'},
{t:'Beitostølen wandeling',p:'nord',cat:['wandeling','uitzicht','natuur'],lat:61.249,lon:8.906,time:'2–5 uur',map:'https://maps.google.com/?q=Beitostolen+hiking',photo:IMG('Beitostolen Norway hiking'),txt:'Toegankelijke bergomgeving aan de rand van Jotunheimen.',bg:'Goede keuze voor heldere dag. Kies route op basis van wind en bewolking.'},
{t:'Valdres meren / kano',p:'nord',cat:['activiteit','water','rustig'],lat:60.986,lon:9.236,time:'2–4 uur',map:'https://maps.google.com/?q=canoe+Valdres+Norway',photo:IMG('Valdres Norway canoe lake'),txt:'Meren en rustige wateractiviteiten in Valdres.',bg:'Check verhuur lokaal. Bij wind minder geschikt.'},
{t:'Risør',p:'gjerstad',cat:['dorp','cultuur','eten','water'],lat:58.720,lon:9.235,time:'halve dag',map:'https://maps.google.com/?q=Risor+Norway',photo:IMG('Risør Norway white wooden houses'),txt:'Witte houten huizen, haven, terrasjes en kustsfeer.',bg:'Mooie afwisseling na de bergen. Combineer met korte kustwandeling.'},
{t:'Kajakken zuidkust',p:'gjerstad',cat:['activiteit','water'],lat:58.720,lon:9.235,time:'2–4 uur',map:'https://maps.google.com/?q=kayak+Risor+Norway',photo:IMG('kayaking Norway archipelago'),txt:'Kajakken tussen eilandjes bij goed weer.',bg:'Ga begeleid als je de kust niet kent. Wind bepaalt alles.'}
];
let page='Planning', selected=autoDay(), filt='alles';
const pages=['Planning','Vandaag','Kaart','Activiteiten','Verblijven','Vraag GPT','Notities'];
function autoDay(){const now=new Date(),m=now.getMonth()+1,d=now.getDate(); if(m===6){let i=days.findIndex(x=>parseInt(x.d)==d); if(i>=0)return i} return 0}
function B(u,l,c='btn'){return `<a class="${c}" href="${u}" target="_blank" rel="noopener">${l}</a>`}
function gpt(extra){const day=days[selected],p=places[day.p];return 'https://chatgpt.com/?q='+encodeURIComponent(`Ik ben op Noorwegen-reis. Vandaag/selectie: ${day.d}, ${p.name}. Route: 17-19 Sogndal, 19-23 Skjåk/Bismo, 23-27 Nord-Aurdal, 27-29 Gjerstad, 29 Kolding, 30 Nijmegen. Voorkeuren: wandelen, natuur, uitzicht, cultuur, historie, dorpen, koffie, restaurants. Geen fietsen. ${extra}`)}
function tabs(){document.getElementById('tabs').innerHTML=pages.map(p=>`<button class="${p===page?'active':''}" onclick="page='${p}';render()">${p}</button>`).join('')}
function strip(){return `<div class="daystrip">${days.map((x,i)=>`<button class="${i===selected?'active':''}" onclick="selected=${i};render()">${x.d}<small>${places[x.p].name}</small></button>`).join('')}</div>`}
function weatherLine(p){return `<div class="weatherline" id="weather">🌦 Weer laden... <span>eenvoudige weergave</span></div>`}
async function loadWeather(p){try{const r=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${p.lat}&longitude=${p.lon}&current=temperature_2m,precipitation,wind_speed_10m&daily=precipitation_probability_max&timezone=auto`);const j=await r.json();document.getElementById('weather').innerHTML=`🌤 ${Math.round(j.current.temperature_2m)}°C <span>· regen ${j.daily.precipitation_probability_max?.[0]??'?'}% · wind ${Math.round(j.current.wind_speed_10m)} km/u</span>`}catch(e){document.getElementById('weather').innerHTML='🌦 Weer niet geladen'}}
function actCard(a){return `<article class="card third"><div class="photo" style="background-image:url('${a.photo}')"></div><div class="row">${a.cat.slice(0,3).map(c=>`<span class="tag ${c==='wandeling'||c==='natuur'?'ok':c==='historie'||c==='cultuur'?'warn':''}">${c}</span>`).join('')}<span class="tag">${a.time}</span></div><h3>${a.t}</h3><p>${a.txt}</p><details><summary>Meer info / achtergrond</summary><p>${a.bg}</p></details><br><div class="row">${B(a.map,'📍 Google Maps','btn blue')}${B(gpt('Vertel meer over '+a.t+' met historische/culturele achtergrond en praktische tips.'),'💬 GPT','btn dark')}</div></article>`}
function renderPlanning(){const d=days[selected],p=places[d.p],acts=activities.filter(a=>a.p===d.p);document.getElementById('app').innerHTML=`${strip()}<section class="grid"><div class="card wide"><div class="photo big" style="background-image:url('${p.photo}')"></div><div class="row"><span class="tag ok">${d.d}</span><span class="tag">${p.name}</span></div><h2>${d.title}</h2><p>${d.plan}</p><p class="muted">${p.about}</p><div class="row">${B(p.map,'📍 Verblijf Google Maps','btn blue')}${B(gpt('Maak een plan voor deze dag: '+d.title),'💬 Plan deze dag','btn dark')}<button class="btn refresh" onclick="location.reload()">🔄 Vernieuwen</button></div></div><div class="card wide">${weatherLine(p)}</div><div class="card wide"><h2>Activiteiten bij deze locatie</h2><div class="grid">${acts.map(actCard).join('')}</div></div></section>`;loadWeather(p)}
function renderToday(){selected=autoDay();renderPlanning()}
function renderActivities(){let cats=['alles','wandeling','cultuur','historie','uitzicht','activiteit','water','regen','autoroute','eten'];let list=filt==='alles'?activities:activities.filter(a=>a.cat.includes(filt));document.getElementById('app').innerHTML=`<section class="card wide"><h2>Activiteiten filteren</h2><div class="chips">${cats.map(c=>`<button class="${filt===c?'active':''}" onclick="filt='${c}';render()">${c}</button>`).join('')}</div></section><section class="grid">${list.map(actCard).join('')}</section>`}
function renderMap(){document.getElementById('app').innerHTML=`<section class="card"><h2>🗺 Alles op de kaart</h2><div id="map" class="map"></div></section>`;setTimeout(()=>{const m=L.map('map').setView([60.5,8.0],6);L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap'}).addTo(m);Object.values(places).forEach(p=>L.marker([p.lat,p.lon]).addTo(m).bindPopup(`<b>🏠 ${p.name}</b><br>${p.addr}<br><a target=_blank href="${p.map}">Google Maps</a>`));activities.forEach(a=>L.circleMarker([a.lat,a.lon],{radius:8}).addTo(m).bindPopup(`<b>${a.t}</b><br>${a.cat.join(', ')}<br><a target=_blank href="${a.map}">Google Maps</a>`))},60)}
function renderStays(){document.getElementById('app').innerHTML=`<section class="grid">${Object.values(places).map(p=>`<div class="card half"><div class="photo" style="background-image:url('${p.photo}')"></div><h3>${p.name}</h3><p class="muted">${p.addr}</p><p>${p.about}</p><div class="row">${B(p.map,'📍 Google Maps','btn blue')}${B(gpt('Geef tips rond verblijf '+p.name),'💬 GPT','btn dark')}</div></div>`).join('')}</section>`}
function renderGPT(){document.getElementById('app').innerHTML=`<section class="grid"><div class="card wide"><h2>💬 Vraag GPT</h2><p>Stel een vraag; je reiscontext wordt automatisch toegevoegd.</p><div class="row">${B(gpt('Wat is vandaag het beste plan?'),'Plan vandaag','btn dark')}${B(gpt('Wat doen we bij regen?'),'Regenplan','btn dark')}${B(gpt('Geef historische achtergrond bij Urnes staafkerk.'),'Urnes achtergrond','btn dark')}</div></div><div class="card wide"><textarea id="q" placeholder="Bijv. We gaan naar Urnes. Geef achtergrond, parkeeradvies, lunchplek en route."></textarea><br><br><button class="btn blue" onclick="location.href=gpt(document.getElementById('q').value)">Open in ChatGPT</button></div></section>`}
function renderNotes(){document.getElementById('app').innerHTML=`<section class="card"><h2>Notities</h2><textarea id="n">${localStorage.nrnotes||''}</textarea><br><br><button class="btn blue" onclick="localStorage.nrnotes=document.getElementById('n').value;alert('Opgeslagen')">Opslaan</button></section>`}
function render(){tabs(); if(page==='Planning')renderPlanning(); if(page==='Vandaag')renderToday(); if(page==='Kaart')renderMap(); if(page==='Activiteiten')renderActivities(); if(page==='Verblijven')renderStays(); if(page==='Vraag GPT')renderGPT(); if(page==='Notities')renderNotes()}
render();
</script>
</body>
</html>
