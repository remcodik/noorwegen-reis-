<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <meta name="theme-color" content="#2d6a4f"/>
  <meta name="description" content="Mobiele reisplanner met kaart, weer, favorieten, status, eigen toevoegingen, GPT-prompts en backup."/>
  <title>Reisplanner</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script defer src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    :root{
      --bg:#f4f9f5;--card:#fff;--green:#2d6a4f;--dark:#173a2a;--soft:#e8f5e9;
      --line:#d7eadb;--muted:#607466;--orange:#c46b24;--blue:#1565c0;--red:#b3261e;
    }
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--dark);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
    main{max-width:980px;margin:auto;padding:14px 12px 54px}
    h1,h2,h3{line-height:1.15}
    .hero{background:linear-gradient(135deg,#173a2a,#2d6a4f 65%,#52b788);color:#fff;border-radius:18px;padding:23px 20px;margin-bottom:12px}
    .hero h1{margin:2px 0 7px;font-size:27px}
    .sub{opacity:.92}
    .row,.tabs,.filters,.chips,.links,.stats{display:flex;gap:7px;flex-wrap:wrap}
    .tabs{position:sticky;top:0;z-index:20;background:#f4f9f5e8;backdrop-filter:blur(10px);padding:8px 0}
    button,.btn,.pill{border:1px solid var(--line);background:#fff;color:#214b35;border-radius:999px;padding:8px 11px;font-weight:850;text-decoration:none;cursor:pointer}
    .tabs button.active,.filters button.active,.btn.primary{background:var(--green);color:#fff;border-color:var(--green)}
    .pill{background:rgba(255,255,255,.16);border-color:rgba(255,255,255,.3);color:#fff;font-size:12px;margin-top:8px}
    .card,.route,.form,.weatherBox{background:#fff;border:1px solid var(--line);border-radius:15px;padding:14px;margin:12px 0;box-shadow:0 2px 12px rgba(39,91,61,.08)}
    .route,.weatherBox{background:var(--soft)}
    .head{display:flex;align-items:flex-start;gap:10px}.head h2{margin:0;flex:1;font-size:21px}
    .date{white-space:nowrap;background:var(--soft);color:var(--green);border-radius:999px;padding:4px 9px;font-size:12px;font-weight:950}
    .note{line-height:1.55;color:#365b44}.small{font-size:12px}.muted{color:var(--muted)}
    .section{font-size:12px;text-transform:uppercase;letter-spacing:1px;font-weight:950;color:var(--green);margin:16px 0 8px}
    .facts{background:#f7fbf8;border:1px dashed #b8d7c1;border-radius:12px;padding:10px 12px;margin:10px 0}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(225px,1fr));gap:9px}
    .box{background:#f8fbf8;border:1px solid #d4e8d4;border-radius:12px;padding:10px}
    .box b{display:block}
    .activity{background:#f8fbf8;border:1px solid #d4e8d4;border-radius:14px;padding:12px;margin:9px 0;position:relative}
    .activity.done{opacity:.62}.activity.plan{border-color:#9dccac}.activity.skip{opacity:.42}
    .activity h3{font-size:16px;margin:0 0 5px}
    .tag{font-size:12px;background:#e8f5e9;color:#2d6a4f;border-radius:999px;padding:3px 8px;font-weight:850}
    .tag.must{background:#ffe7e2;color:#9d2a1f}.tag.rain{background:#e3f2fd;color:#1557a5}.tag.route{background:#fff0dc;color:#92510c}
    .desc{font-size:13px;line-height:1.55;color:#435b4c}
    .statusbar{display:flex;gap:6px;flex-wrap:wrap;margin:9px 0}.statusbar button{font-size:12px;padding:5px 8px}.statusbar button.active{background:#2d6a4f;color:#fff}
    textarea,input,select{width:100%;border:1px solid #cfe3d4;border-radius:10px;padding:9px;font-family:inherit;font-size:15px;background:white}
    textarea{min-height:80px}.notes{min-height:42px;margin-top:8px}
    .restaurant{background:#fff8f5;border:1px solid #e8c8a8;border-radius:12px;padding:12px}.restaurant b{color:#5a2a0a}
    #map{height:68vh;min-height:420px;border-radius:16px;border:1px solid var(--line);overflow:hidden;background:#dfeee5}
    .legend{display:flex;gap:6px;flex-wrap:wrap;margin:8px 0}.legend span{font-size:12px;background:white;border:1px solid var(--line);border-radius:999px;padding:5px 8px}
    .warning{background:#fff8e1;border-color:#ecd38d}.danger{background:#fff5f5;border-color:#f3c2c2;color:#8a1f1f}
    .copybox{background:#fbfffc;border:1px solid #cfe3d4;border-radius:12px;padding:10px;white-space:pre-wrap;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12px}
    .toolbar{display:flex;gap:7px;flex-wrap:wrap;align-items:center}
    .footer{text-align:center;color:#78937f;font-size:12px;margin-top:26px}
    @media(max-width:540px){
      main{padding-left:10px;padding-right:10px}.hero h1{font-size:23px}
      .tabs,.filters{overflow:auto;flex-wrap:nowrap;margin-left:-10px;margin-right:-10px;padding-left:10px}
      .tabs button,.filters button{white-space:nowrap}.card{padding:12px}#map{height:62vh;min-height:380px}
    }
  </style>
</head>

const state = loadState();

function loadState(){
  let initial = {done:{},status:{},notes:{},favorites:{},custom:[],tripOverride:null,createdAt:new Date().toISOString()};
  try{
    const v = localStorage.getItem(STORAGE_KEY);
    if(v) return Object.assign(initial, JSON.parse(v));
    // migratie uit oudere versies
    for(const k of ["noorwegenStateV3","noorwegenStateV2","noorwegenState"]){
      const old = localStorage.getItem(k);
      if(old){ initial.legacy = JSON.parse(old); break; }
    }
  }catch(e){ console.warn(e); }
  return initial;
}
function save(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }

function trip(){ return state.tripOverride || baseTrip; }
function allActivities(){
  return trip().stays.flatMap(stay => {
    const base = stay.activities.map(a => ({...a, stay}));
    const custom = state.custom.filter(c => c.stayId === stay.id).map(c => ({...c, custom:true, stay}));
    return [...base, ...custom];
  });
}
function key(a){ return `${a.stay.id}__${a.id || a.name.replace(/\W+/g,'_')}`; }
function getStatus(a){ return state.status[key(a)] || state.done[key(a)] && "done" || a.status || "todo"; }
function setStatus(a,status){ state.status[key(a)] = status; state.done[key(a)] = status === "done"; save(); render(); }
function toggleFavorite(a){ state.favorites[key(a)] = !state.favorites[key(a)]; save(); render(); }
function isFav(a){ return !!state.favorites[key(a)]; }

function render(){
  const t = trip();
  const acts = allActivities();
  const doneCount = acts.filter(a => getStatus(a)==="done").length;
  const favCount = acts.filter(isFav).length;
  document.getElementById("app").innerHTML = `
    <section class="hero">
      <div class="small">Remco Travel Planner · ${APP_VERSION}</div>
      <h1>🇳🇴 ${escapeHtml(t.title)}</h1>
      <div class="sub">${escapeHtml(t.subtitle || "")}</div>
      <div class="stats">
        <span class="pill">${t.stays.length} verblijven</span>
        <span class="pill">${acts.length} activiteiten</span>
        <span class="pill">${acts.filter(a=>a.prio==="must").length} must-do's</span>
        <span class="pill">${doneCount} gedaan</span>
        <span class="pill">${favCount} favoriet</span>
      </div>
    </section>

    <nav class="tabs">
      ${tabButton("planner","🗺 Planner")}
      ${tabButton("kaart","📍 Kaart")}
      ${tabButton("vandaag","✨ Vandaag")}
      ${tabButton("routes","🚗 Routes")}
      ${tabButton("toevoegen","➕ Toevoegen")}
      ${tabButton("reisplan","⚙️ Reisplan")}
      ${tabButton("backup","💾 Backup")}
    </nav>

    ${tab === "planner" ? plannerView() :
      tab === "kaart" ? mapView() :
      tab === "vandaag" ? todayView() :
      tab === "routes" ? routeView() :
      tab === "toevoegen" ? addView() :
      tab === "reisplan" ? reisplanView() :
      backupView()
    }

    <div class="footer">Gegevens blijven lokaal op je iPhone bewaard. Maak backup vóór je een nieuwe versie uploadt.</div>
  `;
  if(tab === "kaart") setTimeout(initMap, 350);
  if(tab === "planner" || tab === "vandaag") loadWeather();
}
function tabButton(id,label){ return `<button class="${tab===id?'active':''}" onclick="tab='${id}';render()">${label}</button>`; }

    return a.type === filter;
  });
  return `

      <div id="map"></div>
    </section>`;

function initMap(){
  if(!window.L) {
    document.getElementById("map").innerHTML = "<p style='padding:18px'>Kaartbibliotheek kon niet laden. Gebruik Maps-knoppen per activiteit.</p>";
    return;
  }
  if(map) { map.remove(); map=null; markers=[]; }
  map = L.map("map", {scrollWheelZoom:false});
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {maxZoom:18, attribution:"© OpenStreetMap"}).addTo(map);

  const pts = [];
  trip().stays.forEach(s=>{
    if(mapMode==="alles" || mapMode==="stay"){
      addMarker(s.lat,s.lon,`🏠 ${s.label}`, `<b>${s.label}</b><br>${s.base}<br><a target="_blank" href="${s.maps}">Maps</a>`);
      pts.push([s.lat,s.lon]);
    }
    if(mapMode!=="stay"){
      [...s.activities, ...state.custom.filter(c=>c.stayId===s.id).map(c=>({...c,custom:true}))].forEach(a=>{
        if(!a.lat || !a.lon) return;
        if(mapMode==="must" && a.prio!=="must") return;
        if(mapMode==="rain" && !(a.rain || a.type==="cultuur" || a.type==="dorp")) return;
        addMarker(a.lat,a.lon,`${typeIcon[a.type]||"📍"} ${a.name}`, `<b>${a.name}</b><br>${a.drive||""}<br><a target="_blank" href="${a.maps||`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(a.name)}`}">Maps</a>`);
        pts.push([a.lat,a.lon]);
      });
    }
  });
  if(pts.length) map.fitBounds(pts, {padding:[28,28]}); else map.setView([61.2,7.1],7);
}
function addMarker(lat,lon,label,popup){
  const m = L.marker([lat,lon]).addTo(map).bindPopup(popup);
  m.bindTooltip(label);
  markers.push(m);
}

function editCustom(id){
  const c = state.custom.find(x=>x.id===id);
  if(!c) return;
  const name = prompt("Naam", c.name); if(name===null) return;
  const desc = prompt("Omschrijving", c.desc || ""); if(desc===null) return;
  const drive = prompt("Rijtijd/afstand", c.drive || ""); if(drive===null) return;
  c.name=name; c.desc=desc; c.drive=drive;
  c.maps="https://www.google.com/maps/search/?api=1&query="+encodeURIComponent(name+" Norway");
  c.komoot="https://www.komoot.com/search/"+encodeURIComponent(name);

function removeCustom(id){
  if(!confirm("Deze eigen toevoeging verwijderen?")) return;
  state.custom = state.custom.filter(c=>c.id!==id);

}

function parseReisplan(){
  const txt = document.getElementById("reisplanInput").value;
  if(!txt.trim()) return alert("Plak eerst je reisplan.");
  const title = (txt.match(/Bestemming:\s*(.+)/i)||[])[1] || "Nieuwe reis";
  const period = (txt.match(/Periode:\s*(.+)/i)||[])[1] || "";
  const lines = txt.split(/\n/).map(l=>l.trim()).filter(l=>/\|/.test(l));
  const stays = lines.map((l,i)=>{
    const p = l.split("|").map(x=>x.trim());
    const label = p[1] || `Stop ${i+1}`;
    const address = p[2] || label;
    return {
      id:"stay_"+i, label, date:p[0]||"", base:address, address,
      lat: 52 + i, lon: 5 + i, maps:"https://www.google.com/maps/search/?api=1&query="+encodeURIComponent(address),
      note:"Basisstop uit reisplan. Laat GPT activiteiten, restaurants, wandelingen en afstanden aanvullen.",
      facts:["Nog aanvullen via GPT."], tomorrow:"Nog aanvullen via GPT.", dist:[], activities:[], food:[]
    };
  });
  if(!stays.length) return alert("Gebruik regels met: datum | plaats | adres");
  state.tripOverride = {title:`${title} Reisplanner`, subtitle:period, route:stays.map(s=>s.label).join(" → "), stays, routeDays:[]};
  save(); tab="planner"; render();
}
function copyReisplanPrompt(){
  const txt = document.getElementById("reisplanInput").value || "Ik wil een reisplan maken.";
  copyText(`Maak op basis van deze invoer een complete data-structuur voor mijn single-file reisplanner. Vul per verblijf aan: activiteiten, wandelingen, restaurants, regenopties, kaartcoördinaten, Maps-links, Komoot-links, afstanden vanaf accommodatie, verplaatsingsdagen en must-do's. Behoud de structuur zoals in mijn Noorwegen-app.\n\n${txt}`);
}

  return `

      </div>

      <input type="file" id="backupFile" accept="application/json" onchange="restoreFile(event)">

function downloadBackup(){
  const blob = new Blob([JSON.stringify(state,null,2)],{type:"application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href=url; a.download="reisplanner-backup.json"; a.click();
  URL.revokeObjectURL(url);
}
function restoreFile(e){
  const f=e.target.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=()=>{ try{ Object.assign(state, JSON.parse(r.result)); save(); alert("Backup hersteld."); render(); }catch(err){ alert("Geen geldige JSON."); } };
  r.readAsText(f);
}
function restoreText(){
  try{ Object.assign(state, JSON.parse(document.getElementById("restoreText").value)); save(); alert("Backup hersteld."); render(); }
  catch(e){ alert("Geen geldige JSON."); }
}
function resetUserData(){

async function loadWeather(){
  for(const s of trip().stays){
    const el = document.getElementById("weather-"+s.id);
    if(!el || !s.lat || !s.lon) continue;
    try{
      const url = `https://api.open-meteo.com/v1/forecast?latitude=${s.lat}&longitude=${s.lon}&current=temperature_2m,precipitation,weather_code,wind_speed_10m&forecast_days=1`;
      const res = await fetch(url);
      const j = await res.json();
      const c = j.current;
      const icon = weatherIcon(c.weather_code);
      const advice = c.precipitation > 0 ? "regenplan slim" : c.wind_speed_10m > 25 ? "let op wind bij hoogtes" : "goed voor buiten";
      el.innerHTML = `${icon} <b>${escapeHtml(s.label)}</b>: ${Math.round(c.temperature_2m)}°C · wind ${Math.round(c.wind_speed_10m)} km/u · neerslag ${c.precipitation||0} mm · ${advice}`;
    }catch(e){ el.innerHTML = `🌦️ <b>${escapeHtml(s.label)}</b>: weer niet geladen. Gebruik lokale weersapp.`; }
  }
}
function weatherIcon(code){
  if([0].includes(code)) return "☀️";
  if([1,2].includes(code)) return "🌤️";
  if([3].includes(code)) return "☁️";
  if([45,48].includes(code)) return "🌫️";
  if([51,53,55,61,63,65,80,81,82].includes(code)) return "🌧️";
  if([71,73,75,77,85,86].includes(code)) return "❄️";
  if([95,96,99].includes(code)) return "⛈️";
  return "🌦️";
}

function escapeHtml(s){ return String(s ?? "").replace(/[&<>"']/g, m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[m])); }
function escapeAttr(s){ return String(s ?? "").replace(/'/g,"\\'").replace(/"/g,"&quot;"); }
function escapeBacktick(s){ return String(s ?? "").replace(/`/g,"\\`").replace(/\$/g,"\\$"); }

window.addEventListener("load", render);
